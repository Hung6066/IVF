server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    batchwait: 1s
    batchsize: 1048576
    tenant_id: ""

scrape_configs:
  # Collect logs from ALL Docker containers on this host
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: "container"
      - source_labels: ["__meta_docker_container_log_stream"]
        target_label: "logstream"
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: "compose_service"
      - source_labels: ["__meta_docker_container_label_com_docker_swarm_service_name"]
        target_label: "swarm_service"
      - source_labels: ["__meta_docker_container_label_com_docker_stack_namespace"]
        target_label: "stack"
    pipeline_stages:
      # Extract .NET log level from structured logs
      - regex:
          expression: '(?P<level>(trce|dbug|info|warn|fail|crit|Trace|Debug|Information|Warning|Error|Critical|TRACE|DEBUG|INFO|WARN|ERROR|FATAL))'
      - labels:
          level:
      # Drop noisy health check logs
      - drop:
          expression: '(?i)(health|liveness|readiness).*200'
          drop_counter_reason: "healthcheck_noise"
      # Extract HTTP method and path from API logs
      - regex:
          expression: '(?P<http_method>(GET|POST|PUT|DELETE|PATCH))\s+(?P<http_path>/\S+)\s+.*\s(?P<http_status>\d{3})'
      - labels:
          http_method:
          http_status:
