global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  external_labels:
    cluster: "ivf-production"
    environment: "production"

rule_files:
  - "alerts.yml"

scrape_configs:
  # IVF API — OpenTelemetry Prometheus exporter
  - job_name: "ivf-api"
    metrics_path: "/metrics"
    scrape_interval: 10s
    static_configs:
      - targets: ["ivf_api:8080"]
        labels:
          service: "ivf-api"
          environment: "production"

  # Caddy reverse proxy metrics (native Prometheus endpoint)
  - job_name: "caddy"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["ivf_caddy:2019"]
        labels:
          service: "caddy"

  # PostgreSQL (via postgres-exporter sidecar)
  - job_name: "postgres"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["ivf_postgres-exporter:9187"]
        labels:
          service: "postgres-primary"

  # Redis (via redis-exporter sidecar)
  - job_name: "redis"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["ivf_redis-exporter:9121"]
        labels:
          service: "redis"

  # MinIO (native Prometheus metrics)
  - job_name: "minio"
    metrics_path: "/minio/v2/metrics/cluster"
    static_configs:
      - targets: ["minio-metrics:9000"]
        labels:
          service: "minio"

  # Prometheus self-monitoring
  - job_name: "prometheus"
    metrics_path: "/prometheus/metrics"
    basic_auth:
      username: monitor
      password: "MONITORING_PASSWORD_PLACEHOLDER"
    static_configs:
      - targets: ["localhost:9090"]
