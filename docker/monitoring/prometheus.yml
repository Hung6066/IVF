global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  external_labels:
    cluster: "ivf-production"
    environment: "production"

rule_files:
  - "alerts.yml"

scrape_configs:
  # IVF API — OpenTelemetry Prometheus exporter
  - job_name: "ivf-api"
    metrics_path: "/metrics"
    scrape_interval: 10s
    static_configs:
      - targets: ["ivf_api:8080"]
        labels:
          service: "ivf-api"
          environment: "production"

  # Caddy reverse proxy metrics
  - job_name: "caddy"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["ivf_caddy:2019"]
        labels:
          service: "caddy"

  # PostgreSQL (via pg_exporter sidecar, if added)
  - job_name: "postgres"
    static_configs:
      - targets: ["ivf_db:5432"]
        labels:
          service: "postgres-primary"

  # Redis
  - job_name: "redis"
    static_configs:
      - targets: ["ivf_redis:6379"]
        labels:
          service: "redis"

  # MinIO
  - job_name: "minio"
    metrics_path: "/minio/v2/metrics/cluster"
    static_configs:
      - targets: ["ivf_minio:9000"]
        labels:
          service: "minio"

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
