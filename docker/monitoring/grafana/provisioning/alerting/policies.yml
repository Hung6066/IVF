# ═══════════════════════════════════════════════════════════
# Grafana Alerting — Notification Policies
# Routes ALL alerts to Discord contact point
# ═══════════════════════════════════════════════════════════
apiVersion: 1

policies:
  - orgId: 1
    receiver: discord-ivf
    group_by:
      - alertname
      - severity
      - service
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      # Critical alerts — faster notification
      - receiver: discord-ivf
        matchers:
          - severity = critical
        group_wait: 10s
        group_interval: 1m
        repeat_interval: 1h
        continue: false

      # Warning alerts — standard pacing
      - receiver: discord-ivf
        matchers:
          - severity = warning
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h
        continue: false
