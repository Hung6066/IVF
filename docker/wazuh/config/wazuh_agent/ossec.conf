<!--
  Wazuh Agent config — triển khai trên mỗi VPS node
  Agent tự enroll qua WAZUH_MANAGER env var trong docker-compose
  File này bind-mount vào container tại /var/ossec/etc/ossec.conf
-->
<ossec_config>
  <client>
    <server>
      <address>wazuh-manager</address>
      <port>1514</port>
      <protocol>tcp</protocol>
    </server>
    <config-profile>ubuntu,ubuntu24,docker-swarm</config-profile>
    <notify_time>10</notify_time>
    <time-reconnect>60</time-reconnect>
    <auto_restart>yes</auto_restart>
    <crypto_method>aes</crypto_method>
  </client>

  <client_buffer>
    <disabled>no</disabled>
    <queue_size>5000</queue_size>
    <events_per_second>500</events_per_second>
  </client_buffer>

  <!-- ─── Syscheck — File Integrity Monitoring ─── -->
  <syscheck>
    <disabled>no</disabled>
    <frequency>43200</frequency>
    <scan_on_start>yes</scan_on_start>
    <alert_new_files>yes</alert_new_files>

    <!-- System binaries -->
    <directories check_all="yes">/etc,/usr/bin,/usr/sbin</directories>
    <directories check_all="yes">/bin,/sbin,/boot</directories>

    <!-- SSH config — realtime monitoring -->
    <directories realtime="yes" check_all="yes">/etc/ssh</directories>

    <!-- Docker daemon config -->
    <directories realtime="yes" check_all="yes">/etc/docker</directories>

    <!-- Firewall rules -->
    <directories realtime="yes">/etc/ufw</directories>
    <directories realtime="yes">/etc/iptables</directories>

    <!-- Cron jobs — detect persistence -->
    <directories realtime="yes">/etc/cron.d,/etc/crontab</directories>
    <directories realtime="yes">/var/spool/cron</directories>

    <!-- IVF application config -->
    <directories realtime="yes">/opt/ivf/docker</directories>

    <!-- Swarm secrets/configs (manager node) -->
    <directories realtime="yes">/var/lib/docker/swarm</directories>

    <!-- Ignore high-churn Docker runtime dirs -->
    <ignore>/var/lib/docker/containers</ignore>
    <ignore>/var/lib/docker/overlay2</ignore>
    <ignore>/var/lib/docker/network</ignore>
    <ignore>/var/lib/docker/volumes</ignore>
    <ignore>/var/lib/docker/image</ignore>
    <ignore>/var/lib/docker/buildkit</ignore>
    <ignore>/var/lib/docker/tmp</ignore>

    <ignore>/etc/mtab</ignore>
    <ignore>/etc/hosts.deny</ignore>
    <ignore>/etc/mail/statistics</ignore>

    <nodiff>/etc/ssl/private.key</nodiff>
    <skip_nfs>yes</skip_nfs>
  </syscheck>

  <!-- ─── Rootcheck ─── -->
  <rootcheck>
    <disabled>no</disabled>
    <check_files>yes</check_files>
    <check_trojans>yes</check_trojans>
    <check_dev>yes</check_dev>
    <check_sys>yes</check_sys>
    <check_pids>yes</check_pids>
    <check_ports>yes</check_ports>
    <check_if>yes</check_if>
    <frequency>43200</frequency>
  </rootcheck>

  <!-- ─── SCA — Security Configuration Assessment ─── -->
  <sca>
    <enabled>yes</enabled>
    <scan_on_start>yes</scan_on_start>
    <interval>12h</interval>
    <skip_nfs>yes</skip_nfs>
  </sca>

  <!-- ─── Log Collection — OS Logs ─── -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/syslog</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/auth.log</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/kern.log</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/dpkg.log</location>
  </localfile>

  <!-- ─── Log Collection — Docker ─── -->
  <localfile>
    <log_format>json</log_format>
    <location>/var/log/docker.log</location>
    <label key="source">docker-daemon</label>
  </localfile>

  <!-- ─── Log Collection — Active Responses ─── -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/ossec/logs/active-responses.log</location>
  </localfile>

  <!-- ─── Docker Listener — container events ─── -->
  <wodle name="docker-listener">
    <disabled>no</disabled>
    <interval>10m</interval>
    <attempts>5</attempts>
    <run_on_start>yes</run_on_start>
  </wodle>

  <!-- ─── Command Monitoring — Docker & Swarm ─── -->

  <!-- Docker info (daemon status) -->
  <localfile>
    <log_format>full_command</log_format>
    <command>docker info --format '{"ServerVersion":"{{.ServerVersion}}","Containers":{{.Containers}},"ContainersRunning":{{.ContainersRunning}},"ContainersStopped":{{.ContainersStopped}},"Images":{{.Images}},"Swarm":"{{.Swarm.LocalNodeState}}","Nodes":{{.Swarm.Nodes}},"Managers":{{.Swarm.Managers}}}'</command>
    <alias>docker-info</alias>
    <frequency>300</frequency>
  </localfile>

  <!-- Docker Swarm service list -->
  <localfile>
    <log_format>full_command</log_format>
    <command>docker service ls --format '{"name":"{{.Name}}","replicas":"{{.Replicas}}","image":"{{.Image}}","mode":"{{.Mode}}"}' 2>/dev/null || echo '{"error":"not-swarm-manager"}'</command>
    <alias>docker-swarm-services</alias>
    <frequency>120</frequency>
  </localfile>

  <!-- Docker Swarm node status -->
  <localfile>
    <log_format>full_command</log_format>
    <command>docker node ls --format '{"hostname":"{{.Hostname}}","status":"{{.Status}}","availability":"{{.Availability}}","manager":"{{.ManagerStatus}}","engine":"{{.EngineVersion}}"}' 2>/dev/null || echo '{"error":"not-swarm-manager"}'</command>
    <alias>docker-swarm-nodes</alias>
    <frequency>120</frequency>
  </localfile>

  <!-- Running containers -->
  <localfile>
    <log_format>full_command</log_format>
    <command>docker ps --format '{"name":"{{.Names}}","image":"{{.Image}}","status":"{{.Status}}","ports":"{{.Ports}}","created":"{{.CreatedAt}}"}'</command>
    <alias>docker-containers</alias>
    <frequency>180</frequency>
  </localfile>

  <!-- Docker disk usage -->
  <localfile>
    <log_format>full_command</log_format>
    <command>docker system df --format '{"type":"{{.Type}}","total":"{{.TotalCount}}","active":"{{.Active}}","size":"{{.Size}}","reclaimable":"{{.Reclaimable}}"}'</command>
    <alias>docker-disk-usage</alias>
    <frequency>600</frequency>
  </localfile>

  <!-- Unhealthy containers -->
  <localfile>
    <log_format>full_command</log_format>
    <command>docker ps --filter health=unhealthy --format '{"name":"{{.Names}}","image":"{{.Image}}","status":"{{.Status}}"}'</command>
    <alias>docker-unhealthy</alias>
    <frequency>60</frequency>
  </localfile>

  <!-- Docker network list -->
  <localfile>
    <log_format>full_command</log_format>
    <command>docker network ls --format '{"name":"{{.Name}}","driver":"{{.Driver}}","scope":"{{.Scope}}"}'</command>
    <alias>docker-networks</alias>
    <frequency>600</frequency>
  </localfile>

  <!-- Docker volume usage -->
  <localfile>
    <log_format>full_command</log_format>
    <command>docker volume ls --format '{"name":"{{.Name}}","driver":"{{.Driver}}","mountpoint":"{{.Mountpoint}}"}'</command>
    <alias>docker-volumes</alias>
    <frequency>600</frequency>
  </localfile>

  <!-- Swarm failed tasks (recent) -->
  <localfile>
    <log_format>full_command</log_format>
    <command>docker service ls -q 2>/dev/null | xargs -I{} docker service ps {} --filter desired-state=shutdown --format '{"service":"{{.Name}}","state":"{{.CurrentState}}","error":"{{.Error}}"}' 2>/dev/null | grep -i "failed\|rejected\|error" | tail -10 || echo '{"status":"ok"}'</command>
    <alias>docker-swarm-failed-tasks</alias>
    <frequency>120</frequency>
  </localfile>

  <!-- ─── System Monitoring — syscollector ─── -->
  <wodle name="syscollector">
    <disabled>no</disabled>
    <interval>1h</interval>
    <scan_on_start>yes</scan_on_start>
    <hardware>yes</hardware>
    <os>yes</os>
    <network>yes</network>
    <packages>yes</packages>
    <ports all="no">yes</ports>
    <processes>yes</processes>
    <hotfixes>yes</hotfixes>
  </wodle>

  <!-- ─── Active Response ─── -->
  <active-response>
    <disabled>no</disabled>
    <ca_store>etc/wpk_root.pem</ca_store>
    <ca_verification>yes</ca_verification>
  </active-response>

  <!-- ─── Logging ─── -->
  <logging>
    <log_format>plain</log_format>
  </logging>
</ossec_config>
