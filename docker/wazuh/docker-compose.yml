# ═══════════════════════════════════════════════════════════
#  Wazuh SIEM Stack — 2 VPS Docker Swarm
#
#  Topology:
#    vps1 (vmi3129107, 194.163.181.19) — Swarm Leader, role: standby
#    vps2 (vmi3129111, 45.134.226.56)  — Swarm Reachable, role: primary
#
#  Components:
#    Manager + Indexer + Dashboard  → vps2 (vmi3129111)
#    Agent vps1                     → vps1 (vmi3129107, native install)
#    Agent vps2                     → vps2 (vmi3129111, native install)
#
#  Agents: installed natively via apt (wazuh-agent=4.9.2-1)
#    No container agent image exists for 4.9.x
#    Config: /var/ossec/etc/ossec.conf (copy from config/wazuh_agent/)
#
#  Deploy:
#    docker stack deploy -c docker/wazuh/docker-compose.yml wazuh
#
#  Ports:
#    1514/tcp  — Agent communication
#    1515/tcp  — Agent enrollment
#    55000/tcp — Wazuh API (internal only)
#    5601/tcp  — Wazuh Dashboard (via Caddy proxy)
#
#  Truy cập dashboard: https://natra.site/wazuh/
# ═══════════════════════════════════════════════════════════

version: "3.8"

services:
  # ─── Wazuh Manager ───────────────────────────────────────
  wazuh-manager:
    image: wazuh/wazuh-manager:4.9.2
    hostname: wazuh-manager
    restart: unless-stopped
    ports:
      - target: 1514
        published: 1514
        protocol: tcp
        mode: host
      - target: 1515
        published: 1515
        protocol: tcp
        mode: host
      - target: 55000
        published: 55000
        protocol: tcp
        mode: host
    environment:
      INDEXER_URL: https://wazuh-indexer:9200
      INDEXER_USERNAME: admin
      INDEXER_PASSWORD_FILE: /run/secrets/wazuh_indexer_password
      FILEBEAT_SSL_VERIFICATION_MODE: full
      SSL_CERTIFICATE_AUTHORITIES: /etc/ssl/root-ca.pem
      SSL_CERTIFICATE: /etc/ssl/filebeat.pem
      SSL_KEY: /etc/ssl/filebeat.key
      API_USERNAME: wazuh-wui
      API_PASSWORD_FILE: /run/secrets/wazuh_api_password
    volumes:
      - wazuh_api_configuration:/var/ossec/api/configuration
      - wazuh_etc:/var/ossec/etc
      - wazuh_logs:/var/ossec/logs
      - wazuh_queue:/var/ossec/queue
      - wazuh_var_multigroups:/var/ossec/var/multigroups
      - wazuh_integrations:/var/ossec/integrations
      - wazuh_active_response:/var/ossec/active-response/bin
      - wazuh_agentless:/var/ossec/agentless
      - wazuh_wodles:/var/ossec/wodles
      - filebeat_etc:/etc/filebeat
      - filebeat_var:/var/lib/filebeat
      - ./config/wazuh_indexer_ssl_certs/root-ca-manager.pem:/etc/ssl/root-ca.pem
      - ./config/wazuh_indexer_ssl_certs/wazuh-manager.pem:/etc/ssl/filebeat.pem
      - ./config/wazuh_indexer_ssl_certs/wazuh-manager-key.pem:/etc/ssl/filebeat.key
      - ./config/wazuh_cluster/wazuh_manager.conf:/wazuh-config-mount/etc/ossec.conf
      - ./config/wazuh_cluster/custom_decoders:/var/ossec/etc/decoders
      - ./config/wazuh_cluster/custom_rules:/var/ossec/etc/rules
    secrets:
      - wazuh_indexer_password
      - wazuh_api_password
    networks:
      - wazuh-net
      - ivf-monitoring
    deploy:
      placement:
        constraints:
          - node.hostname == vmi3129111
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # ─── Wazuh Indexer (OpenSearch) ──────────────────────────
  wazuh-indexer:
    image: wazuh/wazuh-indexer:4.9.2
    hostname: wazuh-indexer
    restart: unless-stopped
    environment:
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m -XX:MaxDirectMemorySize=512m"
      bootstrap.memory_lock: "true"
    volumes:
      - wazuh_indexer_data:/var/lib/wazuh-indexer
      - ./config/wazuh_indexer_ssl_certs/root-ca.pem:/usr/share/wazuh-indexer/certs/root-ca.pem
      - ./config/wazuh_indexer_ssl_certs/wazuh-indexer-key.pem:/usr/share/wazuh-indexer/certs/wazuh.indexer.key
      - ./config/wazuh_indexer_ssl_certs/wazuh-indexer.pem:/usr/share/wazuh-indexer/certs/wazuh.indexer.pem
      - ./config/wazuh_indexer_ssl_certs/admin.pem:/usr/share/wazuh-indexer/certs/admin.pem
      - ./config/wazuh_indexer_ssl_certs/admin-key.pem:/usr/share/wazuh-indexer/certs/admin-key.pem
      - ./config/wazuh_indexer/wazuh.indexer.yml:/usr/share/wazuh-indexer/opensearch.yml
      - ./config/wazuh_indexer/internal_users.yml:/usr/share/wazuh-indexer/opensearch-security/internal_users.yml
    secrets:
      - wazuh_indexer_password
    networks:
      - wazuh-net
    deploy:
      placement:
        constraints:
          - node.hostname == vmi3129111
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536

  # ─── Wazuh Dashboard ─────────────────────────────────────
  wazuh-dashboard:
    image: wazuh/wazuh-dashboard:4.9.2
    hostname: wazuh-dashboard
    restart: unless-stopped
    # Remove reportsDashboards plugin — crashes on basePath URLs without query params:
    # checkURLParams() does location.href.split('?')[1].split('&') → TypeError
    entrypoint: ["/bin/sh", "-c", "rm -rf /usr/share/wazuh-dashboard/plugins/reportsDashboards && /entrypoint.sh"]
    environment:
      INDEXER_USERNAME: admin
      INDEXER_PASSWORD_FILE: /run/secrets/wazuh_indexer_password
      WAZUH_API_URL: https://wazuh-manager
      DASHBOARD_USERNAME: kibanaserver
      DASHBOARD_PASSWORD_FILE: /run/secrets/wazuh_dashboard_password
      API_USERNAME: wazuh-wui
      API_PASSWORD_FILE: /run/secrets/wazuh_api_password
      API_PASSWORD: wazuh-wui
    volumes:
      - ./config/wazuh_indexer_ssl_certs/wazuh-dashboard.pem:/usr/share/wazuh-dashboard/certs/wazuh-dashboard.pem
      - ./config/wazuh_indexer_ssl_certs/wazuh-dashboard-key.pem:/usr/share/wazuh-dashboard/certs/wazuh-dashboard-key.pem
      - ./config/wazuh_indexer_ssl_certs/root-ca.pem:/usr/share/wazuh-dashboard/certs/root-ca.pem
      - ./config/wazuh_dashboard/opensearch_dashboards.yml:/usr/share/wazuh-dashboard/config/opensearch_dashboards.yml
      - ./config/wazuh_dashboard/wazuh.yml:/usr/share/wazuh-dashboard/data/wazuh/config/wazuh.yml
      - wazuh_dashboard_config:/usr/share/wazuh-dashboard/data/wazuh/config
      - wazuh_dashboard_custom:/usr/share/wazuh-dashboard/plugins/wazuh/public/assets/custom
    secrets:
      - wazuh_indexer_password
      - wazuh_dashboard_password
      - wazuh_api_password
    networks:
      - wazuh-net
      - ivf-monitoring
    deploy:
      placement:
        constraints:
          - node.hostname == vmi3129111
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ─── Wazuh Agents ───────────────────────────────────────
  # Agents are installed NATIVELY on each VPS host (not containers).
  # No wazuh/wazuh-agent Docker image exists for version 4.9.x.
  #
  # Install: WAZUH_MANAGER='127.0.0.1' apt install wazuh-agent=4.9.2-1
  # Config:  cp config/wazuh_agent/ossec.conf /var/ossec/etc/ossec.conf
  # Key:     docker exec <manager> /var/ossec/bin/manage_agents -e <id>
  #          /var/ossec/bin/manage_agents -i <key>
  # Start:   systemctl enable --now wazuh-agent

volumes:
  wazuh_api_configuration:
  wazuh_etc:
  wazuh_logs:
  wazuh_queue:
  wazuh_var_multigroups:
  wazuh_integrations:
  wazuh_active_response:
  wazuh_agentless:
  wazuh_wodles:
  filebeat_etc:
  filebeat_var:
  wazuh_indexer_data:
  wazuh_dashboard_config:
  wazuh_dashboard_custom:

networks:
  wazuh-net:
    driver: overlay
    attachable: true
  ivf-monitoring:
    external: true
    name: ivf-monitoring

secrets:
  wazuh_indexer_password:
    external: true
  wazuh_api_password:
    external: true
  wazuh_dashboard_password:
    external: true
