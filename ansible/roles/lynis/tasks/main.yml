# ═══════════════════════════════════════════════════════════
#  Role: lynis — Security auditing tool
#  Chạy trên: tất cả VPS
#  Lynis thực hiện audit bảo mật hệ thống và lưu report vào /var/log/lynis/
# ═══════════════════════════════════════════════════════════

- name: Xóa file repo Lynis cũ nếu có conflict
  file:
    path: /etc/apt/sources.list.d/cisofy-lynis.list
    state: absent
  ignore_errors: true

- name: Import Lynis GPG key (keyring)
  shell: |
    curl -fsSL https://packages.cisofy.com/keys/cisofy-software-public.key | \
      gpg --dearmor -o /usr/share/keyrings/cisofy-lynis-keyring.gpg
  changed_when: true

- name: Thêm Lynis APT repository (signed-by)
  copy:
    dest: /etc/apt/sources.list.d/cisofy-lynis.list
    content: "deb [signed-by=/usr/share/keyrings/cisofy-lynis-keyring.gpg] https://packages.cisofy.com/community/lynis/deb/ stable main\n"
    mode: '0644'

- name: Cài đặt Lynis
  shell: apt-get update -y -o Acquire::AllowInsecureRepositories=false 2>/dev/null; apt-get install -y lynis
  changed_when: false
  failed_when: false

- name: Tạo thư mục log cho Lynis
  file:
    path: /var/log/lynis
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: Tạo thư mục report cho Lynis
  file:
    path: /var/log/lynis/reports
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: Deploy Lynis custom profile
  template:
    src: lynis-profile.j2
    dest: /etc/lynis/custom.prf
    owner: root
    group: root
    mode: "0644"

- name: Deploy cronjob chạy Lynis hàng tuần
  template:
    src: lynis-cron.j2
    dest: /etc/cron.d/lynis-audit
    owner: root
    group: root
    mode: "0644"

- name: Chạy Lynis audit lần đầu
  shell: |
    TODAY=$(date +%Y-%m-%d)
    lynis audit system \
      --profile /etc/lynis/custom.prf \
      --report-file /var/log/lynis/reports/lynis-${TODAY}.dat \
      --logfile /var/log/lynis/lynis.log \
      --no-colors \
      --quiet
  register: lynis_first_run
  changed_when: false
  failed_when: false

- name: Hiển thị kết quả Lynis lần đầu
  debug:
    msg: "Lynis audit hoàn tất trên {{ inventory_hostname }}. Xem report tại /var/log/lynis/reports/"

# ─── MinIO ship integration ───

- name: Cài đặt MinIO client (mc)
  get_url:
    url: https://dl.min.io/client/mc/release/linux-amd64/mc
    dest: /usr/local/bin/mc
    mode: "0755"
    force: false

- name: Deploy script ship Lynis report lên MinIO
  template:
    src: lynis-ship.j2
    dest: /usr/local/bin/lynis-ship.sh
    owner: root
    group: root
    mode: "0700"

- name: Thêm MinIO ship vào cronjob Lynis
  template:
    src: lynis-cron.j2
    dest: /etc/cron.d/lynis-audit
    owner: root
    group: root
    mode: "0644"

- name: Ship report lần đầu lên MinIO
  command: /usr/local/bin/lynis-ship.sh
  changed_when: false
  failed_when: false

# ─── Manual trigger / scan-on-demand ────────────────────────────────────
- name: Deploy run-lynis.sh (audit + ship wrapper)
  template:
    src: run-lynis.j2
    dest: /usr/local/bin/run-lynis.sh
    owner: root
    group: root
    mode: "0700"

- name: Deploy lynis-scan-watcher.sh (MinIO trigger poller)
  template:
    src: lynis-scan-watcher.j2
    dest: /usr/local/bin/lynis-scan-watcher.sh
    owner: root
    group: root
    mode: "0700"

- name: Deploy systemd service cho scan watcher
  template:
    src: lynis-scan-watcher.service.j2
    dest: /etc/systemd/system/lynis-scan-watcher.service
    owner: root
    group: root
    mode: "0644"
  notify: reload systemd

- name: Deploy systemd timer cho scan watcher
  template:
    src: lynis-scan-watcher.timer.j2
    dest: /etc/systemd/system/lynis-scan-watcher.timer
    owner: root
    group: root
    mode: "0644"
  notify: reload systemd

- name: Kích hoạt và khởi động lynis-scan-watcher timer
  systemd:
    name: lynis-scan-watcher.timer
    enabled: true
    state: started
    daemon_reload: true
