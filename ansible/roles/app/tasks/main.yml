# ═══════════════════════════════════════════════════════════
#  Role: app — Tạo secrets, clone source, deploy stack
#  Chạy trên: manager node only
#  Tương ứng: swarm_s3_deployment_guide.md Section 5-8
# ═══════════════════════════════════════════════════════════

# ─── Generate Secrets (chỉ nếu chưa có) ───
- name: Kiểm tra secrets đã tồn tại
  stat:
    path: "{{ project_dir }}/secrets/ivf_db_password.txt"
  register: secrets_exist

- name: Tạo database passwords
  shell: openssl rand -base64 32 > {{ project_dir }}/secrets/{{ item }}
  loop:
    - ivf_db_password.txt
    - ejbca_db_password.txt
    - signserver_db_password.txt
  when: not secrets_exist.stat.exists
  become_user: "{{ deploy_user }}"

- name: Tạo JWT RSA private key
  command: openssl genrsa -out {{ project_dir }}/secrets/jwt_private.pem 2048
  when: not secrets_exist.stat.exists
  become_user: "{{ deploy_user }}"

- name: Export JWT RSA public key
  command: >
    openssl rsa
    -in {{ project_dir }}/secrets/jwt_private.pem
    -pubout
    -out {{ project_dir }}/secrets/jwt_public.pem
  when: not secrets_exist.stat.exists
  become_user: "{{ deploy_user }}"

- name: Copy JWT private key vào jwt_secret.txt
  copy:
    src: "{{ project_dir }}/secrets/jwt_private.pem"
    dest: "{{ project_dir }}/secrets/jwt_secret.txt"
    remote_src: yes
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: "0600"
  when: not secrets_exist.stat.exists

- name: Tạo MinIO access key
  shell: echo "ivf-admin-$(openssl rand -hex 8)" > {{ project_dir }}/secrets/minio_access_key.txt
  when: not secrets_exist.stat.exists
  become_user: "{{ deploy_user }}"

- name: Tạo MinIO secret key
  shell: openssl rand -base64 32 > {{ project_dir }}/secrets/minio_secret_key.txt
  when: not secrets_exist.stat.exists
  become_user: "{{ deploy_user }}"

- name: Tạo API cert password
  shell: openssl rand -base64 24 > {{ project_dir }}/secrets/api_cert_password.txt
  when: not secrets_exist.stat.exists
  become_user: "{{ deploy_user }}"

- name: Tạo keystore password
  shell: openssl rand -base64 24 > {{ project_dir }}/secrets/keystore_password.txt
  when: not secrets_exist.stat.exists
  become_user: "{{ deploy_user }}"

- name: Tạo SoftHSM PINs
  shell: openssl rand -hex 16 > {{ project_dir }}/secrets/{{ item }}
  loop:
    - softhsm_pin.txt
    - softhsm_so_pin.txt
  when: not secrets_exist.stat.exists
  become_user: "{{ deploy_user }}"

- name: Tạo GPG passphrase
  shell: openssl rand -base64 32 > {{ project_dir }}/secrets/gpg_passphrase.txt
  when: not secrets_exist.stat.exists
  become_user: "{{ deploy_user }}"

- name: Thiết lập permissions cho secrets
  file:
    path: "{{ project_dir }}/secrets"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: "0700"
    recurse: yes

# ─── Docker Secrets (Swarm Raft store) ───
- name: Kiểm tra Docker secrets hiện có
  command: docker secret ls --format '{{ '{{' }}.Name{{ '}}' }}'
  register: existing_secrets
  changed_when: false

- name: Tạo Docker Secrets từ files
  shell: >
    docker secret create {{ item.name }}
    {{ project_dir }}/secrets/{{ item.file }}
  loop:
    - { name: ivf_db_password, file: ivf_db_password.txt }
    - { name: ejbca_db_password, file: ejbca_db_password.txt }
    - { name: signserver_db_password, file: signserver_db_password.txt }
    - { name: jwt_secret, file: jwt_secret.txt }
    - { name: minio_access_key, file: minio_access_key.txt }
    - { name: minio_secret_key, file: minio_secret_key.txt }
    - { name: api_cert_password, file: api_cert_password.txt }
    - { name: keystore_password, file: keystore_password.txt }
    - { name: softhsm_pin, file: softhsm_pin.txt }
    - { name: softhsm_so_pin, file: softhsm_so_pin.txt }
  when: item.name not in existing_secrets.stdout
  loop_control:
    label: "{{ item.name }}"

# ─── Copy stack file & configs lên VPS ───
- name: Kiểm tra source code
  stat:
    path: "{{ project_dir }}/stack.yml"
  register: source_exist

- name: Tạo thư mục dự án
  file:
    path: "{{ project_dir }}/docker/postgres"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: "0755"

- name: Copy stack file
  copy:
    src: "{{ playbook_dir }}/../docker-compose.stack.yml"
    dest: "{{ project_dir }}/stack.yml"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: "0644"

- name: Copy Caddyfile
  copy:
    src: "{{ playbook_dir }}/../Caddyfile"
    dest: "{{ project_dir }}/Caddyfile"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: "0644"

- name: Copy standby entrypoint script
  copy:
    src: "{{ playbook_dir }}/../docker/postgres/standby-entrypoint.sh"
    dest: "{{ project_dir }}/docker/postgres/standby-entrypoint.sh"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: "0755"

# ─── Pull Images từ GHCR ───
- name: Pull API image
  command: "docker pull ghcr.io/{{ ghcr_user }}/ivf:{{ image_tag | default('main') }}"
  become_user: "{{ deploy_user }}"
  when: ghcr_token is defined and ghcr_token | length > 0
  ignore_errors: true

- name: Pull Frontend image
  command: "docker pull ghcr.io/{{ ghcr_user }}/ivf-client:{{ image_tag | default('main') }}"
  become_user: "{{ deploy_user }}"
  when: ghcr_token is defined and ghcr_token | length > 0
  ignore_errors: true

# ─── Pull Images on Worker Nodes ───
- name: Pull images on worker nodes
  command: >
    ssh -o StrictHostKeyChecking=accept-new
    {{ deploy_user }}@{{ hostvars[item].ansible_host }}
    "docker pull {{ img }}"
  loop: "{{ groups['workers'] }}"
  loop_control:
    label: "{{ item }}: {{ img }}"
  vars:
    img: "ghcr.io/{{ ghcr_user }}/ivf:{{ image_tag | default('main') }}"
  when: ghcr_token is defined and ghcr_token | length > 0
  ignore_errors: true

# ─── Deploy Stack ───
- name: Kiểm tra stack đã deploy
  command: docker stack ls --format '{{ '{{' }}.Name{{ '}}' }}'
  register: deployed_stacks
  changed_when: false

- name: Deploy Swarm Stack
  command: >
    docker stack deploy
    -c {{ project_dir }}/stack.yml
    --with-registry-auth
    ivf
  become_user: "{{ deploy_user }}"

- name: Đợi services khởi động
  pause:
    seconds: 30

# ─── PostgreSQL Replication Setup ───
- name: Tìm DB container
  shell: docker ps -q -f name=ivf_db.1 | head -1
  register: db_container_id
  changed_when: false

- name: Kiểm tra replicator user
  shell: >
    docker exec {{ db_container_id.stdout }}
    psql -U postgres -tAc "SELECT 1 FROM pg_catalog.pg_roles WHERE rolname = 'replicator'"
  register: replicator_exists
  changed_when: false
  when: db_container_id.stdout | length > 0

- name: Tạo replicator user
  shell: >
    docker exec {{ db_container_id.stdout }}
    psql -U postgres -c "CREATE USER replicator WITH REPLICATION ENCRYPTED PASSWORD 'replicator_pass';"
  when:
    - db_container_id.stdout | length > 0
    - replicator_exists.stdout != "1"

- name: Thêm replication entry vào pg_hba.conf
  shell: >
    docker exec {{ db_container_id.stdout }}
    sh -c 'grep -q replicator /var/lib/postgresql/data/pg_hba.conf ||
    echo "host replication replicator 0.0.0.0/0 md5" >> /var/lib/postgresql/data/pg_hba.conf'
  when: db_container_id.stdout | length > 0

- name: Thiết lập wal_keep_size
  shell: >
    docker exec {{ db_container_id.stdout }}
    psql -U postgres -c "ALTER SYSTEM SET wal_keep_size = '256MB';"
  when: db_container_id.stdout | length > 0

- name: Tạo replication slot
  shell: >
    docker exec {{ db_container_id.stdout }}
    psql -U postgres -tAc "SELECT CASE WHEN EXISTS (SELECT 1 FROM pg_replication_slots WHERE slot_name='standby_slot') THEN 'exists' ELSE pg_create_physical_replication_slot('standby_slot', true)::text END;"
  when: db_container_id.stdout | length > 0

- name: Reload PostgreSQL config
  shell: >
    docker exec {{ db_container_id.stdout }}
    psql -U postgres -c "SELECT pg_reload_conf();"
  when: db_container_id.stdout | length > 0

- name: Kiểm tra services
  command: docker service ls --format 'table {{ '{{' }}.Name{{ '}}' }}\t{{ '{{' }}.Mode{{ '}}' }}\t{{ '{{' }}.Replicas{{ '}}' }}\t{{ '{{' }}.Image{{ '}}' }}'
  register: service_list
  changed_when: false

- name: Hiện trạng services
  debug:
    var: service_list.stdout_lines

- name: Kiểm tra PostgreSQL replication
  shell: >
    docker exec $(docker ps -q -f name=ivf_db.1 | head -1)
    psql -U postgres -tAc "SELECT state FROM pg_stat_replication LIMIT 1;"
  register: repl_state
  changed_when: false
  ignore_errors: true

- name: Hiện trạng replication
  debug:
    msg: "PostgreSQL standby replication: {{ repl_state.stdout | default('not connected') }}"

- name: Kiểm tra service distribution
  shell: >
    docker service ps --format '{{ '{{' }}.Name{{ '}}' }} → {{ '{{' }}.Node{{ '}}' }}'
    --filter 'desired-state=running'
    ivf_api ivf_caddy ivf_db-standby ivf_redis-replica
  register: service_placement
  changed_when: false
  ignore_errors: true

- name: Hiện phân bổ services
  debug:
    var: service_placement.stdout_lines
