# ═══════════════════════════════════════════════════════════
#  Role: wazuh-agent — Cài đặt Wazuh Agent
#  Chạy trên: tất cả VPS
#  Kết nối về Wazuh Manager (chạy trên vps1 hoặc server riêng)
# ═══════════════════════════════════════════════════════════

- name: Thêm Wazuh GPG key
  apt_key:
    url: https://packages.wazuh.com/key/GPG-KEY-WAZUH
    state: present

- name: Thêm Wazuh APT repository
  apt_repository:
    repo: "deb https://packages.wazuh.com/4.x/apt/ stable main"
    filename: wazuh
    state: present
    update_cache: yes

- name: Cài đặt Wazuh agent
  apt:
    name: "wazuh-agent={{ wazuh_agent_version }}"
    state: present
    update_cache: yes
  environment:
    WAZUH_MANAGER: "{{ wazuh_manager_ip }}"
    WAZUH_MANAGER_PORT: "{{ wazuh_manager_port }}"
    WAZUH_AGENT_GROUP: "{{ wazuh_agent_group }}"
    WAZUH_AGENT_NAME: "{{ wazuh_agent_name }}"

- name: Cấu hình Wazuh agent (ossec.conf)
  template:
    src: ossec.conf.j2
    dest: /var/ossec/etc/ossec.conf
    owner: root
    group: wazuh
    mode: "0640"
    backup: yes
  notify: restart wazuh-agent

- name: Pin Wazuh agent version (tránh auto-upgrade)
  dpkg_selections:
    name: wazuh-agent
    selection: hold

- name: Kích hoạt và khởi động Wazuh agent
  systemd:
    name: wazuh-agent
    enabled: yes
    state: started
    daemon_reload: yes

- name: Kiểm tra Wazuh agent status
  command: /var/ossec/bin/wazuh-control status
  register: wazuh_status
  changed_when: false
  failed_when: false

- name: Hiển thị Wazuh agent status
  debug:
    msg: "{{ wazuh_status.stdout_lines }}"
