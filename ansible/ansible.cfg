[defaults]
inventory = hosts.yml
roles_path = roles
host_key_checking = False
retry_files_enabled = False
stdout_callback = yaml
timeout = 30

[privilege_escalation]
become = False
become_method = sudo

[ssh_connection]
pipelining = True
ssh_args = -o StrictHostKeyChecking=accept-new -o ConnectTimeout=15 -o IPQoS=throughput
