# =============================================
# IVF Monitoring Stack
# Prometheus + Grafana + Loki + Promtail
# Usage: docker compose -f docker-compose.yml -f docker-compose.monitoring.yml up -d
# =============================================

services:
  # =============================================
  # Prometheus — Metrics collection & alerting
  # UI: http://localhost:9090
  # =============================================
  prometheus:
    image: prom/prometheus:latest
    container_name: ivf-prometheus
    volumes:
      - ./docker/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - ./docker/monitoring/prometheus-web.yml:/etc/prometheus/web.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
      - "--web.config.file=/etc/prometheus/web.yml"
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - ivf-monitoring
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "--header=Authorization: Basic bW9uaXRvcjp3RERhSTh6elNUQlB5emZHcDN3UmM2SmtER2dJdjZaRg==",
          "http://localhost:9090/-/healthy",
        ]
      interval: 15s
      timeout: 5s
      retries: 3

  # =============================================
  # Grafana — Dashboards & visualization
  # UI: http://localhost:3000 (admin/admin)
  # =============================================
  grafana:
    image: grafana/grafana:latest
    container_name: ivf-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=wDDaI8zzSTBPyzfGp3wRc6JkDGgIv6ZF
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_USERS_ALLOW_ORG_CREATE=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SECURITY_COOKIE_SECURE=true
      - GF_SECURITY_COOKIE_SAMESITE=strict
      - GF_SECURITY_DISABLE_GRAVATAR=true
      - GF_SECURITY_STRICT_TRANSPORT_SECURITY=true
      - GF_SECURITY_CONTENT_SECURITY_POLICY=true
      - GF_SECURITY_X_CONTENT_TYPE_OPTIONS=true
      - GF_SECURITY_X_XSS_PROTECTION=true
      - GF_SNAPSHOTS_EXTERNAL_ENABLED=false
      - GF_SERVER_ROOT_URL=https://natra.site/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - ivf-monitoring
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000/grafana/api/health",
        ]
      interval: 15s
      timeout: 5s
      retries: 3

  # =============================================
  # Loki — Log aggregation
  # API: http://localhost:3100
  # =============================================
  loki:
    image: grafana/loki:latest
    container_name: ivf-loki
    volumes:
      - ./docker/monitoring/loki-config.yml:/etc/loki/local-config.yaml:ro
      - ./docker/monitoring/loki-rules:/loki/rules:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "127.0.0.1:3100:3100"
    networks:
      - ivf-monitoring
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    # Note: Loki uses a distroless image (no shell), healthcheck disabled

  # =============================================
  # Promtail — Log shipping (Docker → Loki)
  # =============================================
  promtail:
    image: grafana/promtail:latest
    container_name: ivf-promtail
    volumes:
      - ./docker/monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      loki:
        condition: service_started
    networks:
      - ivf-monitoring
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

volumes:
  prometheus_data:
  grafana_data:
  loki_data:

networks:
  ivf-monitoring:
    external: true
