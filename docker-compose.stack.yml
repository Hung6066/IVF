# =====================================================
# IVF System — Docker Swarm Stack (Self-contained)
# =====================================================
# Standalone file for: docker stack deploy -c docker-compose.stack.yml ivf
# Merged from docker-compose.yml + docker-compose.production.yml
# No build, depends_on, container_name, restart, profiles (Swarm-incompatible)
# =====================================================

services:
  # ─── PostgreSQL (IVF Main DB) ───
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD_FILE=/run/secrets/ivf_db_password
    secrets:
      - ivf_db_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - postgres_archive:/var/lib/postgresql/archive
    networks:
      - ivf-data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      placement:
        constraints:
          - node.labels.role == primary
      resources:
        limits:
          memory: 2G

  # ─── IVF API ───
  api:
    image: ghcr.io/hung6066/ivf:latest
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__DefaultConnection=Host=db;Database=ivf_db;Username=postgres;Password=FILE:/run/secrets/ivf_db_password
      - ConnectionStrings__Redis=redis:6379,abortConnect=false
      - JwtSettings__Secret=FILE:/run/secrets/jwt_secret
      - JwtSettings__Issuer=IVF_System
      - JwtSettings__Audience=IVF_Users
      # Digital signing disabled until EJBCA client certs are provisioned
      - DigitalSigning__Enabled=false
      - Cors__AllowedOrigins__0=https://natra.site
      - MinIO__Endpoint=minio:9000
      - MinIO__AccessKey=FILE:/run/secrets/minio_access_key
      - MinIO__SecretKey=FILE:/run/secrets/minio_secret_key
      - MinIO__UseSSL=false
      - MinIO__DocumentsBucket=ivf-documents
      - MinIO__SignedPdfsBucket=ivf-signed-pdfs
      - MinIO__MedicalImagesBucket=ivf-medical-images
    secrets:
      - ivf_db_password
      - jwt_secret
      - minio_access_key
      - minio_secret_key
    networks:
      - ivf-public
      - ivf-data
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 30s
        order: start-first
      rollback_config:
        parallelism: 1
      placement:
        constraints:
          - node.labels.role == primary
      resources:
        limits:
          memory: 1G

  # ─── Redis ───
  redis:
    image: redis:alpine
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    networks:
      - ivf-data
    deploy:
      placement:
        constraints:
          - node.labels.role == primary
      resources:
        limits:
          memory: 512M

  # ─── EJBCA (Certificate Authority) ───
  ejbca:
    image: keyfactor/ejbca-ce:latest
    hostname: ejbca.ivf.local
    environment:
      - DATABASE_JDBC_URL=jdbc:postgresql://ejbca-db:5432/ejbca
      - DATABASE_USER=ejbca
      - DATABASE_PASSWORD_FILE=/run/secrets/ejbca_db_password
      - TLS_SETUP_ENABLED=later
      - INITIAL_ADMIN=;CertificateAuthenticationToken:WITH_ISSUER_SERIAL;CN=ManagementCA,O=IVF Clinic;${EJBCA_ADMIN_CERT_SERIAL:-0};
    secrets:
      - ejbca_db_password
    ports:
      - "8443:8443"
    volumes:
      - ejbca_persistent:/opt/keyfactor/persistent
    networks:
      - ivf-public
      - ivf-signing
      - ivf-data
    deploy:
      placement:
        constraints:
          - node.labels.role == primary
      resources:
        limits:
          memory: 2G

  # ─── EJBCA Database ───
  ejbca-db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=ejbca
      - POSTGRES_PASSWORD_FILE=/run/secrets/ejbca_db_password
      - POSTGRES_DB=ejbca
    secrets:
      - ejbca_db_password
    volumes:
      - ejbca_db_data:/var/lib/postgresql/data
    networks:
      - ivf-data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ejbca"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      placement:
        constraints:
          - node.labels.role == primary

  # ─── SignServer (Document Signing) ───
  signserver:
    image: keyfactor/signserver-ce:latest
    hostname: signserver.ivf.local
    environment:
      - DATABASE_JDBC_URL=jdbc:postgresql://signserver-db:5432/signserver
      - DATABASE_USER=signserver
      - DATABASE_PASSWORD_FILE=/run/secrets/signserver_db_password
      - TLS_SETUP_ENABLED=later
      - INITIAL_ADMIN=;CertificateAuthenticationToken:WITH_ISSUER_SERIAL;CN=ManagementCA,O=IVF Clinic;${SIGNSERVER_ADMIN_CERT_SERIAL:-0};
      - SIGNSERVER_NODEID=node1
      - SOFTHSM_TOKEN_LABEL=SignServerToken
      - SOFTHSM_SO_PIN_FILE=/run/secrets/softhsm_so_pin
      - SOFTHSM_USER_PIN_FILE=/run/secrets/softhsm_pin
    secrets:
      - signserver_db_password
      - keystore_password
      - softhsm_pin
      - softhsm_so_pin
    ports:
      - "9443:8443"
    volumes:
      - signserver_persistent:/opt/keyfactor/persistent
      - softhsm_tokens:/opt/keyfactor/persistent/softhsm/tokens
    networks:
      - ivf-public
      - ivf-signing
      - ivf-data
    deploy:
      placement:
        constraints:
          - node.labels.role == primary
      resources:
        limits:
          memory: 2G

  # ─── SignServer Database ───
  signserver-db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=signserver
      - POSTGRES_PASSWORD_FILE=/run/secrets/signserver_db_password
      - POSTGRES_DB=signserver
    secrets:
      - signserver_db_password
    volumes:
      - signserver_db_data:/var/lib/postgresql/data
    networks:
      - ivf-data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signserver"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      placement:
        constraints:
          - node.labels.role == primary

  # ─── MinIO (Object Storage) ───
  minio:
    image: minio/minio:latest
    environment:
      - MINIO_ROOT_USER_FILE=/run/secrets/minio_access_key
      - MINIO_ROOT_PASSWORD_FILE=/run/secrets/minio_secret_key
    secrets:
      - minio_access_key
      - minio_secret_key
    ports:
      - "9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - ivf-data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      placement:
        constraints:
          - node.labels.role == primary
      resources:
        limits:
          memory: 1G

  # ─── MinIO Init (one-shot) ───
  minio-init:
    image: minio/mc:latest
    entrypoint: >
      /bin/sh -c "
      sleep 10;
      mc alias set ivf http://minio:9000 $$(cat /run/secrets/minio_access_key) $$(cat /run/secrets/minio_secret_key);
      mc mb ivf/ivf-documents --ignore-existing;
      mc mb ivf/ivf-signed-pdfs --ignore-existing;
      mc mb ivf/ivf-medical-images --ignore-existing;
      echo 'MinIO buckets initialized successfully';
      exit 0;
      "
    secrets:
      - minio_access_key
      - minio_secret_key
    networks:
      - ivf-data
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 3

  # ─── Frontend (Angular) ───
  frontend:
    image: ghcr.io/hung6066/ivf-client:latest
    networks:
      - ivf-public
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      placement:
        constraints:
          - node.labels.role == primary
      resources:
        limits:
          memory: 256M

  # ─── Caddy Reverse Proxy ───
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    configs:
      - source: caddyfile_v2
        target: /etc/caddy/Caddyfile
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - ivf-public
    deploy:
      placement:
        constraints:
          - node.labels.role == primary
      resources:
        limits:
          memory: 256M

# ─── Docker Configs ───
configs:
  caddyfile_v2:
    file: ./Caddyfile

# ─── Docker Secrets ───
secrets:
  ivf_db_password:
    external: true
  ejbca_db_password:
    external: true
  signserver_db_password:
    external: true
  keystore_password:
    external: true
  jwt_secret:
    external: true
  minio_access_key:
    external: true
  minio_secret_key:
    external: true
  api_cert_password:
    external: true
  softhsm_pin:
    external: true
  softhsm_so_pin:
    external: true

# ─── Volumes ───
volumes:
  postgres_data:
  postgres_archive:
  ejbca_persistent:
  ejbca_db_data:
  signserver_persistent:
  signserver_db_data:
  softhsm_tokens:
  minio_data:
  caddy_data:
  caddy_config:

# ─── Networks ───
networks:
  ivf-public:
    driver: overlay

  ivf-signing:
    driver: overlay
    internal: true

  ivf-data:
    driver: overlay
    internal: true
