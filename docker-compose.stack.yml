# =====================================================
# IVF System — Docker Swarm Stack (Self-contained)
# =====================================================
# Standalone file for: docker stack deploy -c docker-compose.stack.yml ivf
# Merged from docker-compose.yml + docker-compose.production.yml
# No build, depends_on, container_name, restart, profiles (Swarm-incompatible)
# =====================================================

services:
  # ─── PostgreSQL (IVF Main DB — Primary) ───
  # Admin access: ssh -L 5433:127.0.0.1:5433 root@VPS → psql -h 127.0.0.1 -p 5433
  db:
    image: postgres:16-alpine
    command: >
      postgres
      -c wal_level=replica
      -c max_wal_senders=5
      -c max_replication_slots=5
      -c wal_keep_size=256MB
      -c archive_mode=on
      -c archive_command='cp %p /var/lib/postgresql/archive/%f'
      -c hot_standby=on
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD_FILE=/run/secrets/ivf_db_password
    secrets:
      - ivf_db_password
    ports:
      - target: 5432
        published: 5433
        protocol: tcp
        mode: host
        # SECURITY: Access via SSH tunnel only (ssh -L 5433:127.0.0.1:5433)
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - postgres_archive:/var/lib/postgresql/archive
    networks:
      - ivf-data
      - ivf-monitoring
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      placement:
        constraints:
          - node.labels.role == primary
      resources:
        limits:
          memory: 2G

  # ─── PostgreSQL Exporter (Prometheus metrics) ───
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    entrypoint:
      [
        "/bin/sh",
        "-c",
        'export DATA_SOURCE_NAME="postgresql://postgres:$$(cat /run/secrets/ivf_db_password)@db:5432/ivf_db?sslmode=disable" && /bin/postgres_exporter',
      ]
    secrets:
      - ivf_db_password
    networks:
      - ivf-data
      - ivf-monitoring
    deploy:
      placement:
        constraints:
          - node.labels.role == primary
      resources:
        limits:
          memory: 128M

  # ─── IVF API ───
  api:
    image: ghcr.io/hung6066/ivf:waf-analytics
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__DefaultConnection=Host=db;Database=ivf_db;Username=postgres;Password=FILE:/run/secrets/ivf_db_password;SSL Mode=Prefer;Trust Server Certificate=true
      - ConnectionStrings__Redis=redis:6379,password=FILE:/run/secrets/redis_password,abortConnect=false
      - JwtSettings__Secret=FILE:/run/secrets/jwt_secret
      - JwtSettings__Issuer=IVF_System
      - JwtSettings__Audience=IVF_Users
      # Digital signing enabled (no mTLS until client certs are provisioned)
      - DigitalSigning__Enabled=true
      - DigitalSigning__SkipTlsValidation=true
      - DigitalSigning__RequireMtls=false
      - DigitalSigning__ClientCertificatePath=
      - DigitalSigning__ClientCertificatePasswordFile=
      - DigitalSigning__TrustedCaCertPath=
      - DigitalSigning__SignServerUrl=https://signserver:8443/signserver
      - DigitalSigning__EjbcaUrl=https://ejbca:8443/ejbca
      - Cors__AllowedOrigins__0=https://natra.site
      - MinIO__Endpoint=minio:9000
      - MinIO__AccessKey=FILE:/run/secrets/minio_access_key
      - MinIO__SecretKey=FILE:/run/secrets/minio_secret_key
      - MinIO__UseSSL=false
      - MinIO__DocumentsBucket=ivf-documents
      - MinIO__SignedPdfsBucket=ivf-signed-pdfs
      - MinIO__MedicalImagesBucket=ivf-medical-images
    secrets:
      - ivf_db_password
      - jwt_secret
      - minio_access_key
      - minio_secret_key
      - redis_password
      - source: jwt_private_key
        target: /app/keys/jwt/jwt-private.pem
        mode: 0400
    # SECURITY: Docker socket access via restricted proxy (no direct mount)
    environment:
      - DOCKER_HOST=tcp://docker-proxy:2375
    networks:
      - ivf-public
      - ivf-data
      - ivf-monitoring
    healthcheck:
      # Swarm dùng healthcheck này để biết container thực sự sẵn sàng phục vụ
      # Không có healthcheck → Swarm coi container running = healthy (sai!)
      # Use curl to hit the health endpoint (/bin/sh is dash, not bash — /dev/tcp doesn't work)
      test:
        ["CMD-SHELL", "curl -sf http://127.0.0.1:8080/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 45s # .NET khởi động chậm, tránh false restart
    deploy:
      replicas: 2
      placement:
        # No node constraint — allow scheduling on both VPS1 (manager) and VPS2 (worker)
        # Spread ensures 1 replica per node for true HA
        preferences:
          - spread: node.hostname
      update_config:
        parallelism: 1
        delay: 30s
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 120s
      resources:
        limits:
          memory: 1G

  # ─── Docker Socket Proxy (restricted API for infrastructure monitoring) ───
  docker-proxy:
    image: tecnativa/docker-socket-proxy:latest
    environment:
      - CONTAINERS=1
      - SERVICES=1
      - TASKS=1
      - NODES=1
      - NETWORKS=0
      - VOLUMES=0
      - IMAGES=0
      - EXEC=0
      - SWARM=1
      - POST=0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - ivf-data
    deploy:
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          memory: 64M

  # ─── Redis ───
  # Admin access: ssh -L 16379:127.0.0.1:6379 root@VPS → redis-cli -h 127.0.0.1 -p 16379 -a PASSWORD
  redis:
    image: redis:alpine
    entrypoint:
      - /bin/sh
      - -c
      - 'redis-server --requirepass "$$(cat /run/secrets/redis_password)" --maxmemory 256mb --maxmemory-policy allkeys-lru'
    secrets:
      - redis_password
    ports:
      - target: 6379
        published: 6379
        protocol: tcp
        mode: host
    networks:
      - ivf-data
      - ivf-monitoring
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$(cat /run/secrets/redis_password) --no-auth-warning ping | grep PONG"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    deploy:
      placement:
        constraints:
          - node.labels.role == primary
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 60s
      resources:
        limits:
          memory: 512M

  # ─── Redis Exporter (Prometheus metrics) ───
  redis-exporter:
    image: oliver006/redis_exporter:latest
    entrypoint:
      - /bin/sh
      - -c
      - 'export REDIS_PASSWORD=$$(cat /run/secrets/redis_password) && /redis_exporter'
    environment:
      - REDIS_ADDR=redis://redis:6379
    secrets:
      - redis_password
    networks:
      - ivf-data
      - ivf-monitoring
    deploy:
      placement:
        constraints:
          - node.labels.role == primary
      resources:
        limits:
          memory: 64M

  # ─── EJBCA (Certificate Authority) ───
  # Admin UI: https://localhost:8443/ejbca/adminweb/
  # Access: ssh -L 8443:localhost:8443 root@VPS → https://localhost:8443
  ejbca:
    image: keyfactor/ejbca-ce:latest
    hostname: ejbca.ivf.local
    environment:
      - DATABASE_JDBC_URL=jdbc:postgresql://ejbca-db:5432/ejbca
      - DATABASE_USER=ejbca
      - DATABASE_PASSWORD=ejbca
      - TLS_SETUP_ENABLED=later
      - INITIAL_ADMIN=;CertificateAuthenticationToken:WITH_ISSUER_SERIAL;CN=ManagementCA,O=IVF Clinic;${EJBCA_ADMIN_CERT_SERIAL:-0};
    ports:
      - target: 8443
        published: 8443
        protocol: tcp
        mode: host
    # SECURITY: In production, use firewall (iptables/ufw) to block 8443 from WAN.
    # Only accessible via SSH tunnel: ssh -L 8443:localhost:8443 root@VPS
    volumes:
      - ejbca_persistent:/opt/keyfactor/persistent
      - ejbca_wildfly_cfg:/opt/keyfactor/appserver/standalone/configuration
    networks:
      # SECURITY: Removed from ivf-public — no public-facing access needed
      - ivf-signing
      - ivf-data
    deploy:
      placement:
        constraints:
          - node.labels.role == primary
      resources:
        limits:
          memory: 2G

  # ─── EJBCA Database ───
  ejbca-db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=ejbca
      - POSTGRES_PASSWORD=ejbca
      - POSTGRES_DB=ejbca
    volumes:
      - ejbca_db_data:/var/lib/postgresql/data
    networks:
      - ivf-data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ejbca"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      placement:
        constraints:
          - node.labels.role == primary

  # ─── SignServer (Document Signing) ───
  # Admin UI: https://localhost:9443/signserver/adminweb/
  # Access: ssh -L 9443:localhost:9443 root@VPS → https://localhost:9443
  signserver:
    image: keyfactor/signserver-ce:latest
    hostname: signserver.ivf.local
    environment:
      - DATABASE_JDBC_URL=jdbc:postgresql://signserver-db:5432/signserver
      - DATABASE_USER=signserver
      - DATABASE_PASSWORD=signserver
      - TLS_SETUP_ENABLED=later
      - INITIAL_ADMIN=;CertificateAuthenticationToken:WITH_ISSUER_SERIAL;CN=ManagementCA,O=IVF Clinic;${SIGNSERVER_ADMIN_CERT_SERIAL:-0};
      - SIGNSERVER_NODEID=node1
      - SOFTHSM_TOKEN_LABEL=SignServerToken
      - SOFTHSM_SO_PIN_FILE=/run/secrets/softhsm_so_pin
      - SOFTHSM_USER_PIN_FILE=/run/secrets/softhsm_pin
    secrets:
      - keystore_password
      - softhsm_pin
      - softhsm_so_pin
    ports:
      - target: 8443
        published: 9443
        protocol: tcp
        mode: host
    # SECURITY: In production, use firewall (iptables/ufw) to block 9443 from WAN.
    # Only accessible via SSH tunnel: ssh -L 9443:localhost:9443 root@VPS
    volumes:
      - signserver_persistent:/opt/keyfactor/persistent
      - signserver_wildfly_cfg:/opt/keyfactor/wildfly-35.0.1.Final/standalone/configuration
      - softhsm_tokens:/opt/keyfactor/persistent/softhsm/tokens
    networks:
      # SECURITY: Removed from ivf-public — no public-facing access needed
      - ivf-signing
      - ivf-data
    deploy:
      placement:
        constraints:
          - node.labels.role == primary
      resources:
        limits:
          memory: 2G

  # ─── SignServer Database ───
  signserver-db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=signserver
      - POSTGRES_PASSWORD=signserver
      - POSTGRES_DB=signserver
    volumes:
      - signserver_db_data:/var/lib/postgresql/data
    networks:
      - ivf-data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signserver"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      placement:
        constraints:
          - node.labels.role == primary

  # ─── MinIO (Object Storage) ───
  minio:
    image: minio/minio:latest
    environment:
      - MINIO_ROOT_USER_FILE=/run/secrets/minio_access_key
      - MINIO_ROOT_PASSWORD_FILE=/run/secrets/minio_secret_key
      - MINIO_PROMETHEUS_AUTH_TYPE=public
    secrets:
      - minio_access_key
      - minio_secret_key
    # Admin access: ssh -L 9001:127.0.0.1:9001 root@VPS → http://127.0.0.1:9001
    ports:
      - target: 9001
        published: 9001
        protocol: tcp
        mode: host
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      ivf-data:
      ivf-monitoring:
        aliases:
          - minio-metrics
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      placement:
        constraints:
          - node.labels.role == primary
      resources:
        limits:
          memory: 1G

  # ─── MinIO Init (one-shot) ───
  minio-init:
    image: minio/mc:latest
    entrypoint: >
      /bin/sh -c "
      sleep 10;
      mc alias set ivf http://minio:9000 $$(cat /run/secrets/minio_access_key) $$(cat /run/secrets/minio_secret_key);
      mc mb ivf/ivf-documents --ignore-existing;
      mc mb ivf/ivf-signed-pdfs --ignore-existing;
      mc mb ivf/ivf-medical-images --ignore-existing;
      echo 'MinIO buckets initialized successfully';
      exit 0;
      "
    secrets:
      - minio_access_key
      - minio_secret_key
    networks:
      - ivf-data
    deploy:
      restart_policy:
        condition: none
      replicas: 1

  # ─── Frontend (Angular) ───
  frontend:
    image: ghcr.io/hung6066/ivf-client:sha-9d2df1f
    networks:
      - ivf-public
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--timeout=5", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 60s
      placement:
        constraints:
          - node.labels.role == primary
      resources:
        limits:
          memory: 256M

  # ─── Caddy Reverse Proxy (Global — runs on every node) ───
  caddy:
    image: caddy:2-alpine
    ports:
      - target: 80
        published: 80
        mode: host
      - target: 443
        published: 443
        mode: host
    configs:
      - source: caddyfile_v11
        target: /etc/caddy/Caddyfile
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - ivf-public
      - ivf-monitoring
    deploy:
      mode: global
      resources:
        limits:
          memory: 256M

  # ─── PostgreSQL Standby (Streaming Replication) ───
  db-standby:
    image: postgres:16-alpine
    entrypoint: /standby-entrypoint.sh
    environment:
      - PRIMARY_HOST=db
      - PRIMARY_PORT=5432
      - REPLICATOR_USER=replicator
      - REPLICATOR_PASSWORD=replicator_pass
    configs:
      - source: standby_entrypoint
        target: /standby-entrypoint.sh
        mode: 0755
    volumes:
      - standby_data:/var/lib/postgresql/data
    networks:
      - ivf-data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.role == standby
      resources:
        limits:
          memory: 1G

  # ─── Redis Replica ───
  redis-replica:
    image: redis:alpine
    entrypoint:
      - /bin/sh
      - -c
      - 'redis-server --replicaof redis 6379 --masterauth "$$(cat /run/secrets/redis_password)" --requirepass "$$(cat /run/secrets/redis_password)" --maxmemory 256mb --maxmemory-policy allkeys-lru'
    secrets:
      - redis_password
    networks:
      - ivf-data
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.role == standby
      resources:
        limits:
          memory: 512M

# ─── Docker Configs ───
configs:
  caddyfile_v11:
    file: ./Caddyfile
  standby_entrypoint:
    file: ./docker/postgres/standby-entrypoint.sh

# ─── Docker Secrets ───
secrets:
  ivf_db_password:
    external: true
  keystore_password:
    external: true
  jwt_secret:
    external: true
  minio_access_key:
    external: true
  minio_secret_key:
    external: true
  api_cert_password:
    external: true
  softhsm_pin:
    external: true
  softhsm_so_pin:
    external: true
  jwt_private_key:
    external: true
  redis_password:
    external: true

# ─── Volumes ───
volumes:
  postgres_data:
  postgres_archive:
  standby_data:
  ejbca_persistent:
  ejbca_wildfly_cfg:
  ejbca_db_data:
  signserver_persistent:
  signserver_wildfly_cfg:
  signserver_db_data:
  softhsm_tokens:
  minio_data:
  caddy_data:
  caddy_config:

# ─── Networks ───
networks:
  ivf-public:
    driver: overlay
    driver_opts:
      encrypted: "true"

  ivf-signing:
    driver: overlay
    internal: true
    driver_opts:
      encrypted: "true"

  ivf-data:
    driver: overlay
    internal: true
    driver_opts:
      encrypted: "true"

  ivf-monitoring:
    external: true
