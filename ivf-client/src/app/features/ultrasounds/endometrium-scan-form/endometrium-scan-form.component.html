<div class="p-6 max-w-2xl mx-auto">
  <div class="flex items-center gap-3 mb-6">
    <button (click)="back()" class="text-gray-500 hover:text-gray-700">
      <i class="fas fa-arrow-left"></i>
    </button>
    <h1 class="text-2xl font-bold text-gray-800">Kết quả siêu âm nội mạc tử cung</h1>
  </div>

  @if (error()) {
    <div class="mb-4 p-3 bg-red-50 border border-red-200 rounded text-red-700 text-sm">
      {{ error() }}
    </div>
  }

  <div class="bg-white rounded-lg shadow p-6 space-y-6">
    <!-- Basic Info -->
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Mã chu kỳ</label>
        <input
          [value]="cycleId"
          readonly
          class="w-full border rounded px-3 py-2 text-sm bg-gray-50 text-gray-500"
        />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1"
          >Ngày siêu âm <span class="text-red-500">*</span></label
        >
        <input
          type="date"
          [(ngModel)]="form.examDate"
          class="w-full border rounded px-3 py-2 text-sm"
        />
      </div>
    </div>

    <!-- Endometrium -->
    <div>
      <h3 class="text-sm font-semibold text-gray-700 mb-3 border-b pb-2">Nội mạc tử cung</h3>
      <div class="grid grid-cols-1 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Độ dày NMTC (mm)</label>
          <input
            type="number"
            [(ngModel)]="form.endometriumThickness"
            min="0"
            max="30"
            step="0.1"
            class="w-full border rounded px-3 py-2 text-sm"
            placeholder="VD: 9.5"
          />
        </div>
      </div>
    </div>

    <!-- Ovaries -->
    <div>
      <h3 class="text-sm font-semibold text-gray-700 mb-3 border-b pb-2">Buồng trứng</h3>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">BT trái — Số nang</label>
          <input
            type="number"
            [(ngModel)]="form.leftOvaryCount"
            min="0"
            class="w-full border rounded px-3 py-2 text-sm"
          />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">BT phải — Số nang</label>
          <input
            type="number"
            [(ngModel)]="form.rightOvaryCount"
            min="0"
            class="w-full border rounded px-3 py-2 text-sm"
          />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1"
            >Kích thước nang BT trái (mm)</label
          >
          <input
            [(ngModel)]="form.leftFollicles"
            class="w-full border rounded px-3 py-2 text-sm"
            placeholder="VD: 12, 14, 16"
          />
          <p class="text-xs text-gray-400 mt-1">Các kích thước cách nhau bằng dấu phẩy</p>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1"
            >Kích thước nang BT phải (mm)</label
          >
          <input
            [(ngModel)]="form.rightFollicles"
            class="w-full border rounded px-3 py-2 text-sm"
            placeholder="VD: 11, 13, 15, 17"
          />
          <p class="text-xs text-gray-400 mt-1">Các kích thước cách nhau bằng dấu phẩy</p>
        </div>
      </div>
    </div>

    <!-- Findings -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Nhận xét / Kết luận</label>
      <textarea
        [(ngModel)]="form.findings"
        rows="4"
        class="w-full border rounded px-3 py-2 text-sm"
        placeholder="Nhận xét về hình ảnh siêu âm, các bất thường..."
      ></textarea>
    </div>

    <div class="flex justify-end gap-3 pt-2">
      <button
        (click)="back()"
        class="px-4 py-2 border rounded text-sm text-gray-700 hover:bg-gray-50"
      >
        Hủy
      </button>
      <button
        (click)="save()"
        [disabled]="saving()"
        class="px-6 py-2 bg-blue-600 text-white rounded text-sm hover:bg-blue-700 disabled:opacity-50"
      >
        {{ saving() ? 'Đang lưu...' : 'Lưu kết quả' }}
      </button>
    </div>
  </div>
</div>
