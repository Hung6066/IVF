<div class="p-6 max-w-2xl mx-auto">
  <div class="flex items-center gap-3 mb-6">
    <a [routerLink]="['/pregnancy', cycleId, 'beta-hcg']" class="text-gray-500 hover:text-gray-700">
      <i class="fas fa-arrow-left"></i>
    </a>
    <h1 class="text-2xl font-bold text-gray-800">Xuất viện / Kết thúc chu kỳ</h1>
  </div>

  @if (error()) {
    <div class="mb-4 p-3 bg-red-50 border border-red-200 text-red-700 rounded-lg text-sm">
      {{ error() }}
    </div>
  }

  @if (pregnancy()) {
    <div class="mb-6 p-4 bg-blue-50 border border-blue-200 rounded-xl text-sm">
      <div class="grid grid-cols-2 gap-3">
        <div>
          <span class="text-gray-500">Trạng thái:</span>
          <strong>{{ pregnancy()!.pregnancyStatus }}</strong>
        </div>
        <div>
          <span class="text-gray-500">Beta HCG:</span>
          <strong>{{ pregnancy()!.betaHcg ?? '—' }}</strong>
        </div>
        <div>
          <span class="text-gray-500">Túi thai:</span>
          <strong>{{ pregnancy()!.gestationalSacs ?? '—' }}</strong>
        </div>
        <div>
          <span class="text-gray-500">Tim thai:</span>
          <strong>{{ pregnancy()!.fetalHeartbeats ?? '—' }}</strong>
        </div>
      </div>
    </div>
  }

  <div class="bg-white rounded-xl border border-gray-200 p-6 space-y-5">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Kết quả *</label>
      <select
        [(ngModel)]="form.outcome"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500"
      >
        @for (o of outcomes; track o) {
          <option [value]="o">{{ o }}</option>
        }
      </select>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Ngày xuất viện</label>
      <input
        type="date"
        [(ngModel)]="form.dischargeDate"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500"
      />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Ghi chú</label>
      <textarea
        [(ngModel)]="form.notes"
        rows="3"
        placeholder="Ghi chú khi xuất viện..."
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 resize-none"
      ></textarea>
    </div>

    <div class="flex justify-end gap-3 pt-2 border-t border-gray-100">
      <a [routerLink]="['/pregnancy', cycleId, 'beta-hcg']" class="px-4 py-2 text-gray-600 text-sm"
        >Huỷ</a
      >
      <button
        (click)="submit()"
        [disabled]="saving()"
        class="flex items-center gap-2 px-5 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 disabled:opacity-50 text-sm font-medium"
      >
        <i class="fas fa-sign-out-alt"></i>
        {{ saving() ? 'Đang xử lý...' : 'Xuất viện / Kết thúc' }}
      </button>
    </div>
  </div>
</div>
