<div class="min-h-screen bg-gray-50 p-6">
  <div class="max-w-2xl mx-auto">
    <div class="flex items-center gap-3 mb-6">
      <button (click)="back()" class="text-gray-500 hover:text-gray-700">
        <i class="fas fa-arrow-left"></i>
      </button>
      <h1 class="text-2xl font-bold text-gray-800">Phê Duyệt Người Hiến Tinh Trùng</h1>
    </div>

    @if (loading()) {
      <div class="text-center py-16 text-gray-400">
        <i class="fas fa-spinner fa-spin fa-2x"></i>
      </div>
    } @else {
      @if (error()) {
        <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-4">
          {{ error() }}
        </div>
      }
      @if (success()) {
        <div class="bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-lg mb-4">
          {{ success() }}
        </div>
      }

      @if (donor(); as d) {
        <div class="bg-blue-50 border border-blue-200 rounded-xl p-4 mb-4 text-sm flex gap-6">
          <div>
            <span class="text-gray-500">Mã tạm:</span>
            <span class="font-semibold">{{ d.code }}</span>
          </div>
          <div>
            <span class="text-gray-500">Nhóm máu:</span>
            <span class="font-medium">{{ d.bloodType }}</span>
          </div>
          <div>
            <span class="text-gray-500">Trạng thái:</span>
            <span class="font-medium">{{ d.status }}</span>
          </div>
        </div>
      }

      <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Quyết định</label>
          <div class="flex gap-4">
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="radio" [(ngModel)]="decision" value="Approved" class="text-green-600" />
              <span class="text-sm text-green-700 font-medium">Phê duyệt</span>
            </label>
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="radio" [(ngModel)]="decision" value="Rejected" class="text-red-600" />
              <span class="text-sm text-red-700 font-medium">Từ chối</span>
            </label>
          </div>
        </div>

        @if (decision === 'Approved') {
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Mã NHTT chính thức <span class="text-red-500">*</span></label
            >
            <input
              type="text"
              [(ngModel)]="donorCode"
              class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"
              placeholder="NH-XXXXX"
            />
          </div>
        }
        @if (decision === 'Rejected') {
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Lý do từ chối</label>
            <textarea
              [(ngModel)]="rejectionReason"
              rows="3"
              class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"
            ></textarea>
          </div>
        }

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Ghi chú của bác sĩ</label>
          <textarea
            [(ngModel)]="notes"
            rows="2"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"
          ></textarea>
        </div>

        <div class="flex justify-end gap-3 pt-2">
          <button (click)="back()" class="px-4 py-2 text-sm border border-gray-300 rounded-lg">
            Hủy
          </button>
          <button
            (click)="submit()"
            [disabled]="saving()"
            [class]="
              decision === 'Approved'
                ? 'px-6 py-2 text-sm bg-green-600 text-white rounded-lg disabled:opacity-50'
                : 'px-6 py-2 text-sm bg-red-600 text-white rounded-lg disabled:opacity-50'
            "
          >
            {{ saving() ? 'Đang xử lý...' : decision === 'Approved' ? 'Phê duyệt' : 'Từ chối' }}
          </button>
        </div>
      </div>
    }
  </div>
</div>
