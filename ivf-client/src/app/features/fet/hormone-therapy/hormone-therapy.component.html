<div class="p-6 max-w-3xl mx-auto">
  <div class="flex items-center gap-3 mb-6">
    <button (click)="back()" class="text-gray-500 hover:text-gray-800">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
    </button>
    <h1 class="text-xl font-semibold text-gray-800">Nội tiết CBNMTC</h1>
  </div>

  @if (loading()) {
    <div class="flex justify-center py-12"><div class="animate-spin w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full"></div></div>
  }

  @if (error()) {
    <div class="bg-red-50 border border-red-200 text-red-700 rounded-lg p-4 mb-4">{{ error() }}</div>
  }

  @if (successMsg()) {
    <div class="bg-green-50 border border-green-200 text-green-700 rounded-lg p-4 mb-4">{{ successMsg() }}</div>
  }

  @if (protocol(); as p) {
    <div class="bg-gray-50 rounded-lg p-4 mb-6 text-sm text-gray-600">
      <span class="font-medium">Chu kỳ:</span> {{ p.cycleId }} |
      <span class="font-medium">Loại:</span> {{ p.prepType }} |
      <span class="font-medium">Bắt đầu:</span> {{ formatDate(p.startDate) }}
    </div>

    <form (ngSubmit)="save()" class="space-y-6">
      <div class="bg-white border rounded-lg p-5">
        <h2 class="text-lg font-medium text-gray-800 mb-4">Estrogen</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Thuốc</label>
            <input type="text" [(ngModel)]="form.estrogenDrug" name="estrogenDrug" placeholder="VD: Progynova, Estrofem"
              class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Liều</label>
            <input type="text" [(ngModel)]="form.estrogenDose" name="estrogenDose" placeholder="VD: 6mg/ngày"
              class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Ngày bắt đầu</label>
            <input type="date" [(ngModel)]="form.estrogenStartDate" name="estrogenStartDate"
              class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500" />
          </div>
        </div>
      </div>

      <div class="bg-white border rounded-lg p-5">
        <h2 class="text-lg font-medium text-gray-800 mb-4">Progesterone</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Thuốc</label>
            <input type="text" [(ngModel)]="form.progesteroneDrug" name="progesteroneDrug" placeholder="VD: Utrogestan, Crinone"
              class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Liều</label>
            <input type="text" [(ngModel)]="form.progesteroneDose" name="progesteroneDose" placeholder="VD: 800mg/ngày"
              class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Ngày bắt đầu</label>
            <input type="date" [(ngModel)]="form.progesteroneStartDate" name="progesteroneStartDate"
              class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500" />
          </div>
        </div>
      </div>

      <div class="flex gap-3">
        <button type="submit" [disabled]="saving()"
          class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:opacity-50">
          {{ saving() ? 'Đang lưu...' : 'Lưu nội tiết' }}
        </button>
        <button type="button" (click)="back()" class="px-6 py-2 border rounded-lg hover:bg-gray-50">Quay lại</button>
      </div>
    </form>
  }
</div>
