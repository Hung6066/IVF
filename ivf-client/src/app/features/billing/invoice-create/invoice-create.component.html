<div class="min-h-screen bg-gray-50 p-6">
  <div class="max-w-xl mx-auto">
    <div class="flex items-center gap-3 mb-6">
      <button (click)="back()" class="text-gray-500 hover:text-gray-700">
        <i class="fas fa-arrow-left"></i>
      </button>
      <h1 class="text-2xl font-bold text-gray-800">Tạo Hóa Đơn Mới</h1>
    </div>

    @if (error()) {
      <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-4">
        {{ error() }}
      </div>
    }

    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1"
          >Bệnh nhân <span class="text-red-500">*</span></label
        >
        <app-patient-search
          [(ngModel)]="form.patientId"
          name="patientId"
          placeholder="Tìm tên, mã BN, SĐT..."
        ></app-patient-search>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Mã chu kỳ (tùy chọn)</label>
        <app-cycle-search
          [(ngModel)]="form.cycleId"
          name="cycleId"
          [patientId]="form.patientId || null"
          placeholder="Tìm mã chu kỳ..."
        ></app-cycle-search>
      </div>
      <div class="flex justify-end gap-3 pt-2">
        <button
          (click)="back()"
          class="px-4 py-2 text-sm border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50"
        >
          Hủy
        </button>
        <button
          (click)="save()"
          [disabled]="saving()"
          class="px-6 py-2 text-sm bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:opacity-50"
        >
          {{ saving() ? 'Đang tạo...' : 'Tạo hóa đơn' }}
        </button>
      </div>
    </div>
  </div>
</div>
