<div class="p-6 max-w-lg mx-auto">
  <div class="flex items-center gap-3 mb-6">
    <button (click)="back()" class="text-gray-500 hover:text-gray-700">
      <i class="fas fa-arrow-left"></i>
    </button>
    <h1 class="text-2xl font-bold text-gray-800">Thanh toán hóa đơn</h1>
  </div>

  <div
    *ngIf="error()"
    class="mb-4 p-3 bg-red-50 border border-red-200 rounded text-red-700 text-sm"
  >
    {{ error() }}
  </div>

  <div class="bg-white rounded-lg shadow p-6 space-y-4">
    <div class="p-3 bg-blue-50 rounded text-sm text-blue-700">
      Hóa đơn: <strong>{{ invoiceId }}</strong>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1"
        >Số tiền thanh toán (VNĐ) <span class="text-red-500">*</span></label
      >
      <input
        type="number"
        [(ngModel)]="form.amount"
        min="0"
        step="1000"
        class="w-full border rounded px-3 py-2 text-sm"
        placeholder="0"
      />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Phương thức thanh toán</label>
      <select [(ngModel)]="form.paymentMethod" class="w-full border rounded px-3 py-2 text-sm">
        @for (m of methods; track m.value) {
          <option [value]="m.value">{{ m.label }}</option>
        }
      </select>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Mã giao dịch / Tham chiếu</label>
      <input
        [(ngModel)]="form.transactionReference"
        class="w-full border rounded px-3 py-2 text-sm"
        placeholder="Tùy chọn — mã chuyển khoản, số hóa đơn, v.v."
      />
    </div>

    <div class="flex justify-end gap-3 pt-2">
      <button
        (click)="back()"
        class="px-4 py-2 border rounded text-sm text-gray-700 hover:bg-gray-50"
      >
        Hủy
      </button>
      <button
        (click)="save()"
        [disabled]="saving()"
        class="px-6 py-2 bg-green-600 text-white rounded text-sm hover:bg-green-700 disabled:opacity-50"
      >
        {{ saving() ? 'Đang xử lý...' : 'Xác nhận thanh toán' }}
      </button>
    </div>
  </div>
</div>
