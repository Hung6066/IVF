<div class="modal-overlay" (click)="close()">
  <div class="modal-content modal-lg" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h3>Kham lan dau - {{ consultation.patientName }}</h3>
      <button class="close-btn" (click)="close()">&times;</button>
    </div>

    <form (ngSubmit)="onSubmit()">
      <div class="modal-body">
        <!-- Patient Info -->
        <div class="patient-summary">
          <span><strong>Ma BN:</strong> {{ consultation.patientCode }}</span>
          <span><strong>Bac si:</strong> {{ consultation.doctorName }}</span>
        </div>

        <!-- Chief Complaint -->
        <div class="form-group">
          <label class="form-label">Ly do kham *</label>
          <textarea class="form-control" [(ngModel)]="form.chiefComplaint" name="chiefComplaint"
            rows="2" placeholder="Mo ta ly do den kham..."></textarea>
        </div>

        <!-- Medical History -->
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Tien su benh ly</label>
            <textarea class="form-control" [(ngModel)]="form.medicalHistory" name="medicalHistory"
              rows="3" placeholder="Cac benh ly da mac, dang dieu tri..."></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">Tien su ngoai khoa</label>
            <textarea class="form-control" [(ngModel)]="form.surgicalHistory" name="surgicalHistory"
              rows="3" placeholder="Cac phau thuat da thuc hien..."></textarea>
          </div>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Tien su gia dinh</label>
            <textarea class="form-control" [(ngModel)]="form.familyHistory" name="familyHistory"
              rows="3" placeholder="Benh ly di truyen, tien su vo sinh trong gia dinh..."></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">Tien su benh khac</label>
            <textarea class="form-control" [(ngModel)]="form.pastHistory" name="pastHistory"
              rows="3" placeholder="Cac benh khac, di ung thuoc..."></textarea>
          </div>
        </div>

        <!-- Obstetric & Menstrual History -->
        <div class="section-divider">
          <h4>Tien su san phu khoa</h4>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Tien su san khoa</label>
            <textarea class="form-control" [(ngModel)]="form.obstetricHistory" name="obstetricHistory"
              rows="3" placeholder="PARA, so lan mang thai, say thai, de thuong, de mo..."></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">Tien su kinh nguyet</label>
            <textarea class="form-control" [(ngModel)]="form.menstrualHistory" name="menstrualHistory"
              rows="3" placeholder="Chu ky kinh, ngay dau ky kinh cuoi, luong kinh..."></textarea>
          </div>
        </div>

        <!-- Physical Examination -->
        <div class="section-divider">
          <h4>Kham lam sang</h4>
        </div>

        <div class="form-group">
          <label class="form-label">Ket qua kham</label>
          <textarea class="form-control" [(ngModel)]="form.physicalExamination" name="physicalExamination"
            rows="4" placeholder="Kham tong quat, kham phu khoa, sieu am..."></textarea>
        </div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" (click)="close()">Huy</button>
        <button type="submit" class="btn btn-primary" [disabled]="saving()">
          {{ saving() ? 'Dang luu...' : 'Luu ho so' }}
        </button>
      </div>
    </form>
  </div>
</div>
