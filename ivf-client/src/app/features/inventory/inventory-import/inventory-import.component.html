<div class="p-6 max-w-3xl mx-auto">
  <div class="flex items-center gap-3 mb-6">
    <button (click)="back()" class="text-gray-500 hover:text-gray-800"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg></button>
    <h1 class="text-xl font-semibold text-gray-800">Nhập kho</h1>
  </div>
  @if (error()) { <div class="bg-red-50 border border-red-200 text-red-700 rounded-lg p-4 mb-4">{{ error() }}</div> }
  @if (successMsg()) { <div class="bg-green-50 border border-green-200 text-green-700 rounded-lg p-4 mb-4">{{ successMsg() }}</div> }
  <form (ngSubmit)="save()" class="bg-white border rounded-lg p-5 space-y-4">
    <div class="grid grid-cols-2 gap-4">
      <div><label class="block text-sm font-medium text-gray-700 mb-1">Mã vật tư *</label><input type="text" [(ngModel)]="form.itemId" name="itemId" required class="w-full border rounded-lg px-3 py-2" /></div>
      <div><label class="block text-sm font-medium text-gray-700 mb-1">Số lượng *</label><input type="number" [(ngModel)]="form.quantity" name="qty" min="1" required class="w-full border rounded-lg px-3 py-2" /></div>
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div><label class="block text-sm font-medium text-gray-700 mb-1">Nhà cung cấp</label><input type="text" [(ngModel)]="form.supplierName" name="supplier" class="w-full border rounded-lg px-3 py-2" /></div>
      <div><label class="block text-sm font-medium text-gray-700 mb-1">Đơn giá</label><input type="number" [(ngModel)]="form.unitCost" name="cost" min="0" class="w-full border rounded-lg px-3 py-2" /></div>
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div><label class="block text-sm font-medium text-gray-700 mb-1">Số lô</label><input type="text" [(ngModel)]="form.batchNumber" name="batch" class="w-full border rounded-lg px-3 py-2" /></div>
      <div><label class="block text-sm font-medium text-gray-700 mb-1">Người nhập</label><input type="text" [(ngModel)]="form.performedByName" name="performer" class="w-full border rounded-lg px-3 py-2" /></div>
    </div>
    <div class="flex gap-3">
      <button type="submit" [disabled]="saving()" class="px-6 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 disabled:opacity-50">{{ saving() ? 'Đang lưu...' : 'Nhập kho' }}</button>
      <button type="button" (click)="back()" class="px-6 py-2 border rounded-lg hover:bg-gray-50">Hủy</button>
    </div>
  </form>
</div>
