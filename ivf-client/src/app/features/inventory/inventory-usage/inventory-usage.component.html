<div class="p-6 max-w-3xl mx-auto">
  <div class="flex items-center gap-3 mb-6">
    <button (click)="back()" class="text-gray-500 hover:text-gray-800"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg></button>
    <h1 class="text-xl font-semibold text-gray-800">Xuất kho / Ghi nhận sử dụng</h1>
  </div>
  @if (error()) { <div class="bg-red-50 border border-red-200 text-red-700 rounded-lg p-4 mb-4">{{ error() }}</div> }
  @if (successMsg()) { <div class="bg-green-50 border border-green-200 text-green-700 rounded-lg p-4 mb-4">{{ successMsg() }}</div> }
  <form (ngSubmit)="save()" class="bg-white border rounded-lg p-5 space-y-4">
    <div class="grid grid-cols-2 gap-4">
      <div><label class="block text-sm font-medium text-gray-700 mb-1">Mã vật tư *</label><input type="text" [(ngModel)]="form.itemId" name="itemId" required class="w-full border rounded-lg px-3 py-2" /></div>
      <div><label class="block text-sm font-medium text-gray-700 mb-1">Số lượng *</label><input type="number" [(ngModel)]="form.quantity" name="qty" min="1" required class="w-full border rounded-lg px-3 py-2" /></div>
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div><label class="block text-sm font-medium text-gray-700 mb-1">Mục đích</label><input type="text" [(ngModel)]="form.reason" name="reason" class="w-full border rounded-lg px-3 py-2" placeholder="VD: Sử dụng cho BN, hao phí" /></div>
      <div><label class="block text-sm font-medium text-gray-700 mb-1">Người thực hiện</label><input type="text" [(ngModel)]="form.performedByName" name="performer" class="w-full border rounded-lg px-3 py-2" /></div>
    </div>
    <div><label class="block text-sm font-medium text-gray-700 mb-1">Tham chiếu (mã BN/CK)</label><input type="text" [(ngModel)]="form.reference" name="ref" class="w-full border rounded-lg px-3 py-2" /></div>
    <div class="flex gap-3">
      <button type="submit" [disabled]="saving()" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:opacity-50">{{ saving() ? 'Đang lưu...' : 'Ghi nhận xuất' }}</button>
      <button type="button" (click)="back()" class="px-6 py-2 border rounded-lg hover:bg-gray-50">Hủy</button>
    </div>
  </form>
</div>
