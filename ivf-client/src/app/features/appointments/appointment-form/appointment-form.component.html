<div class="p-6 max-w-xl mx-auto">
  <div class="flex items-center gap-3 mb-6">
    <button (click)="back()" class="text-gray-500 hover:text-gray-700">
      <i class="fas fa-arrow-left"></i>
    </button>
    <h1 class="text-2xl font-bold text-gray-800">Đặt lịch hẹn mới</h1>
  </div>

  <div
    *ngIf="error()"
    class="mb-4 p-3 bg-red-50 border border-red-200 rounded text-red-700 text-sm"
  >
    {{ error() }}
  </div>

  <div class="bg-white rounded-lg shadow p-6 space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1"
        >Bệnh nhân <span class="text-red-500">*</span></label
      >
      <app-patient-search
        [(ngModel)]="form.patientId"
        name="patientId"
        placeholder="Tìm tên, mã BN, SĐT..."
      ></app-patient-search>
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1"
          >Ngày & giờ hẹn <span class="text-red-500">*</span></label
        >
        <input
          type="datetime-local"
          [(ngModel)]="form.scheduledAt"
          class="w-full border rounded px-3 py-2 text-sm"
        />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Thời lượng (phút)</label>
        <input
          type="number"
          [(ngModel)]="form.durationMinutes"
          min="10"
          max="180"
          step="5"
          class="w-full border rounded px-3 py-2 text-sm"
        />
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Loại hẹn</label>
      <select [(ngModel)]="form.type" class="w-full border rounded px-3 py-2 text-sm">
        @for (t of types; track t) {
          <option [value]="t">{{ typeLabels[t] }}</option>
        }
      </select>
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Mã bác sĩ</label>
        <input
          [(ngModel)]="form.doctorId"
          class="w-full border rounded px-3 py-2 text-sm"
          placeholder="Tùy chọn"
        />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Phòng</label>
        <input
          [(ngModel)]="form.roomNumber"
          class="w-full border rounded px-3 py-2 text-sm"
          placeholder="VD: P101"
        />
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Mã chu kỳ điều trị</label>
      <app-cycle-search
        [(ngModel)]="form.cycleId"
        name="cycleId"
        [patientId]="form.patientId || null"
        placeholder="Tìm mã chu kỳ (tùy chọn)..."
      ></app-cycle-search>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Ghi chú</label>
      <textarea
        [(ngModel)]="form.notes"
        rows="3"
        class="w-full border rounded px-3 py-2 text-sm"
        placeholder="Ghi chú thêm..."
      ></textarea>
    </div>

    <div class="flex justify-end gap-3 pt-2">
      <button
        (click)="back()"
        class="px-4 py-2 border rounded text-sm text-gray-700 hover:bg-gray-50"
      >
        Hủy
      </button>
      <button
        (click)="save()"
        [disabled]="saving()"
        class="px-6 py-2 bg-blue-600 text-white rounded text-sm hover:bg-blue-700 disabled:opacity-50"
      >
        {{ saving() ? 'Đang lưu...' : 'Tạo lịch hẹn' }}
      </button>
    </div>
  </div>
</div>
