<div class="p-6 max-w-lg mx-auto">
  <div class="flex items-center gap-3 mb-6">
    <button routerLink="/egg-donor" class="text-gray-500 hover:text-gray-700">
      <i class="fas fa-arrow-left"></i>
    </button>
    <h1 class="text-2xl font-bold text-gray-800">Đăng ký Người cho trứng</h1>
  </div>

  @if (error()) {
    <div class="mb-4 p-3 bg-red-50 border border-red-200 text-red-700 rounded-lg text-sm">
      {{ error() }}
    </div>
  }

  <div class="bg-white rounded-xl border border-gray-200 p-6 space-y-5">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Bệnh nhân *</label>
      <app-patient-search
        [(ngModel)]="patientId"
        name="patientId"
        [genderFilter]="'Female'"
        placeholder="Tìm tên, mã BN, SĐT..."
      ></app-patient-search>
      <p class="mt-1 text-xs text-gray-500">
        Bệnh nhân phải được tạo trong mục Bệnh nhân trước khi đăng ký làm NCT
      </p>
    </div>
    <div class="flex justify-end gap-3 pt-2">
      <button routerLink="/egg-donor" class="px-4 py-2 text-gray-600 text-sm">Huỷ</button>
      <button
        (click)="submit()"
        [disabled]="saving()"
        class="flex items-center gap-2 px-5 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:opacity-50 text-sm font-medium"
      >
        <i class="fas fa-user-plus"></i> {{ saving() ? 'Đang xử lý...' : 'Đăng ký NCT' }}
      </button>
    </div>
  </div>
</div>
