<div class="bg-white border rounded-lg p-5">
  <div class="flex gap-3 mb-4">
    <button
      (click)="activePanel = 'trigger'"
      [class]="
        activePanel === 'trigger'
          ? 'text-blue-600 border-b-2 border-blue-600 pb-1 font-medium'
          : 'text-gray-500 pb-1'
      "
    >
      Tiêm rụng trứng
    </button>
    <button
      (click)="activePanel = 'decision'"
      [class]="
        activePanel === 'decision'
          ? 'text-blue-600 border-b-2 border-blue-600 pb-1 font-medium'
          : 'text-gray-500 pb-1'
      "
    >
      Quyết định
    </button>
  </div>

  @if (activePanel === 'trigger') {
    @if (triggerGiven) {
      <div class="bg-green-50 border border-green-200 text-green-700 rounded-lg p-4">
        Đã tiêm rụng trứng
      </div>
    } @else {
      <form (ngSubmit)="onSubmitTrigger()" class="space-y-4">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Thuốc trigger</label>
            <input
              type="text"
              [(ngModel)]="triggerForm.triggerDrug"
              name="triggerDrug"
              required
              placeholder="VD: Ovitrelle, Decapeptyl"
              class="w-full border rounded-lg px-3 py-2"
            />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Ngày tiêm</label>
            <input
              type="date"
              [(ngModel)]="triggerForm.triggerDate"
              name="triggerDate"
              class="w-full border rounded-lg px-3 py-2"
            />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Giờ tiêm</label>
            <input
              type="time"
              [(ngModel)]="triggerForm.triggerTime"
              name="triggerTime"
              class="w-full border rounded-lg px-3 py-2"
            />
          </div>
        </div>
        <div class="grid grid-cols-3 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">LH</label>
            <input
              type="number"
              [(ngModel)]="triggerForm.lhLab"
              name="lh"
              step="0.1"
              class="w-full border rounded-lg px-3 py-2"
            />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">E2</label>
            <input
              type="number"
              [(ngModel)]="triggerForm.e2Lab"
              name="e2"
              step="0.1"
              class="w-full border rounded-lg px-3 py-2"
            />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">P4</label>
            <input
              type="number"
              [(ngModel)]="triggerForm.p4Lab"
              name="p4"
              step="0.01"
              class="w-full border rounded-lg px-3 py-2"
            />
          </div>
        </div>
        @if (plannedOpuDate) {
          <div class="bg-orange-50 border border-orange-200 rounded-lg p-3 flex items-center gap-3">
            <i class="fa-solid fa-clock-rotate-left text-orange-500"></i>
            <div>
              <span class="text-sm font-medium text-orange-800">Dự kiến chọc trứng (OPU): </span>
              <span class="text-sm font-bold text-orange-900">{{ plannedOpuDate }}</span>
              <span class="text-xs text-orange-600 ml-2">(trigger + 36 giờ)</span>
            </div>
          </div>
        }
        <div class="flex gap-3">
          <button
            type="submit"
            [disabled]="saving"
            class="px-5 py-2 bg-orange-600 text-white rounded-lg hover:bg-orange-700 disabled:opacity-50"
          >
            {{ saving ? 'Đang lưu...' : 'Ghi nhận Trigger' }}
          </button>
          <button
            type="button"
            (click)="cancel.emit()"
            class="px-5 py-2 border rounded-lg hover:bg-gray-50"
          >
            Hủy
          </button>
        </div>
      </form>
    }
  }

  @if (activePanel === 'decision') {
    <form (ngSubmit)="onSubmitDecision()" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Quyết định</label>
        <div class="flex gap-4">
          @for (opt of ['Proceed', 'Delay', 'Cancel', 'ConvertIVM']; track opt) {
            <label class="flex items-center gap-2 cursor-pointer">
              <input
                type="radio"
                [(ngModel)]="decision"
                [value]="opt"
                name="decision"
                class="text-blue-600"
              />
              <span class="text-sm">{{
                opt === 'Proceed'
                  ? 'Tiếp tục'
                  : opt === 'Delay'
                    ? 'Hoãn'
                    : opt === 'Cancel'
                      ? 'Ngưng'
                      : 'Chuyển IVM'
              }}</span>
            </label>
          }
        </div>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Lý do</label>
        <textarea
          [(ngModel)]="decisionReason"
          name="reason"
          rows="2"
          class="w-full border rounded-lg px-3 py-2"
        ></textarea>
      </div>
      <div class="flex gap-3">
        <button
          type="submit"
          [disabled]="saving"
          class="px-5 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700 disabled:opacity-50"
        >
          {{ saving ? 'Đang lưu...' : 'Xác nhận' }}
        </button>
        <button
          type="button"
          (click)="cancel.emit()"
          class="px-5 py-2 border rounded-lg hover:bg-gray-50"
        >
          Hủy
        </button>
      </div>
    </form>
  }
</div>
