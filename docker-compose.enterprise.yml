# Enterprise Docker Compose Configuration
# Optimized for 10,000+ concurrent users, 99.99% uptime
# Use: docker stack deploy -c docker-compose.stack.yml -c docker-compose.enterprise.yml ivf

version: '3.9'

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "5"

x-healthcheck-defaults: &healthcheck-defaults
  interval: 15s
  timeout: 10s
  retries: 3
  start_period: 30s

services:
  # =============================================================================
  # API SERVICE - Enterprise Configuration
  # =============================================================================
  api:
    deploy:
      mode: replicated
      replicas: 4
      update_config:
        parallelism: 1
        delay: 30s
        failure_action: rollback
        monitor: 60s
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 5
        window: 120s
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
      placement:
        constraints:
          - node.role == worker
        preferences:
          - spread: node.labels.zone
    environment:
      # Connection Pooling
      - Database__MinPoolSize=20
      - Database__MaxPoolSize=200
      - Database__ConnectionIdleLifetime=300
      - Database__ConnectionPruningInterval=10
      - Database__CommandTimeout=30
      - Database__Keepalive=30
      # Performance
      - Database__EnableDetailedErrors=false
      - Database__SlowQueryThresholdMs=500
      # Caching
      - Redis__ConnectionString=redis:6379
      - Redis__Password_FILE=/run/secrets/redis_password
      # Rate Limiting
      - RateLimiting__GlobalLimit=10000
      - RateLimiting__PerUserLimit=100
      - RateLimiting__WindowSeconds=60
    logging: *default-logging
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/live"]

  # =============================================================================
  # DATABASE - Enterprise Configuration with Read Replicas
  # =============================================================================
  db:
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.labels.db-role == primary
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '2.0'
          memory: 4G
    environment:
      # Memory Configuration
      - POSTGRES_SHARED_BUFFERS=2GB
      - POSTGRES_WORK_MEM=256MB
      - POSTGRES_MAINTENANCE_WORK_MEM=512MB
      - POSTGRES_EFFECTIVE_CACHE_SIZE=6GB
      # WAL Configuration
      - POSTGRES_WAL_BUFFERS=64MB
      - POSTGRES_MAX_WAL_SIZE=4GB
      - POSTGRES_MIN_WAL_SIZE=1GB
      # Connection Limits
      - POSTGRES_MAX_CONNECTIONS=500
    command: >
      postgres
      -c shared_buffers=2GB
      -c work_mem=256MB
      -c maintenance_work_mem=512MB
      -c effective_cache_size=6GB
      -c wal_buffers=64MB
      -c max_wal_size=4GB
      -c min_wal_size=1GB
      -c max_connections=500
      -c checkpoint_completion_target=0.9
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c default_statistics_target=100
      -c log_min_duration_statement=500
      -c log_checkpoints=on
      -c log_connections=on
      -c log_disconnections=on
      -c log_lock_waits=on
      -c log_temp_files=0
      -c track_activities=on
      -c track_counts=on
      -c track_io_timing=on
      -c track_functions=all
      -c wal_level=replica
      -c max_wal_senders=10
      -c max_replication_slots=10
      -c hot_standby=on
      -c archive_mode=on
      -c archive_command='cp %p /var/lib/postgresql/archive/%f'
    logging: *default-logging
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "pg_isready -U postgres && psql -U postgres -c 'SELECT 1'"]

  # Read Replica 1
  db-read-1:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/ivf_db_password
      PGDATA: /var/lib/postgresql/data
    volumes:
      - postgres_read1_data:/var/lib/postgresql/data
    command: >
      postgres
      -c hot_standby=on
      -c max_standby_streaming_delay=30s
      -c wal_receiver_status_interval=10s
      -c hot_standby_feedback=on
      -c max_connections=200
      -c shared_buffers=1GB
      -c effective_cache_size=3GB
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.labels.db-role == read-replica
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
    networks:
      - ivf-data
    secrets:
      - ivf_db_password
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "pg_isready -U postgres"]
    logging: *default-logging

  # Read Replica 2
  db-read-2:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/ivf_db_password
      PGDATA: /var/lib/postgresql/data
    volumes:
      - postgres_read2_data:/var/lib/postgresql/data
    command: >
      postgres
      -c hot_standby=on
      -c max_standby_streaming_delay=30s
      -c wal_receiver_status_interval=10s
      -c hot_standby_feedback=on
      -c max_connections=200
      -c shared_buffers=1GB
      -c effective_cache_size=3GB
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.labels.db-role == read-replica
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
    networks:
      - ivf-data
    secrets:
      - ivf_db_password
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "pg_isready -U postgres"]
    logging: *default-logging

  # =============================================================================
  # PgBouncer - Connection Pooling Proxy
  # =============================================================================
  pgbouncer:
    image: edoburu/pgbouncer:1.21.0
    environment:
      DATABASE_URL: postgres://postgres:${DB_PASSWORD}@db:5432/ivf_db
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 2000
      DEFAULT_POOL_SIZE: 100
      MIN_POOL_SIZE: 20
      RESERVE_POOL_SIZE: 50
      RESERVE_POOL_TIMEOUT: 5
      MAX_DB_CONNECTIONS: 200
      MAX_USER_CONNECTIONS: 200
      SERVER_LIFETIME: 3600
      SERVER_IDLE_TIMEOUT: 600
      SERVER_CONNECT_TIMEOUT: 15
      SERVER_LOGIN_RETRY: 15
      QUERY_TIMEOUT: 120
      QUERY_WAIT_TIMEOUT: 120
      CLIENT_IDLE_TIMEOUT: 0
      CLIENT_LOGIN_TIMEOUT: 60
      AUTODB_IDLE_TIMEOUT: 3600
      STATS_PERIOD: 60
      LOG_CONNECTIONS: 1
      LOG_DISCONNECTIONS: 1
      LOG_POOLER_ERRORS: 1
      ADMIN_USERS: postgres
    deploy:
      mode: replicated
      replicas: 2
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
      update_config:
        parallelism: 1
        delay: 10s
    networks:
      - ivf-data
      - ivf-public
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "127.0.0.1", "-p", "6432"]
      interval: 10s
      timeout: 5s
      retries: 3
    logging: *default-logging

  # =============================================================================
  # REDIS - Enterprise Configuration with Sentinel
  # =============================================================================
  redis:
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.labels.cache-role == primary
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 1536mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --tcp-keepalive 300
      --timeout 0
      --tcp-backlog 511
      --databases 16
      --save 900 1
      --save 300 10
      --save 60 10000
      --stop-writes-on-bgsave-error yes
      --rdbcompression yes
      --rdbchecksum yes
      --replica-serve-stale-data yes
      --replica-read-only yes
      --repl-diskless-sync yes
      --repl-diskless-sync-delay 5
      --slowlog-log-slower-than 10000
      --slowlog-max-len 128
      --latency-monitor-threshold 100
      --activedefrag yes
      --active-defrag-ignore-bytes 100mb
      --active-defrag-threshold-lower 10
      --active-defrag-threshold-upper 25
    logging: *default-logging
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]

  # Redis Replica 1
  redis-replica-1:
    image: redis:7-alpine
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --masterauth ${REDIS_PASSWORD}
      --replicaof redis 6379
      --replica-read-only yes
      --maxmemory 1024mb
      --maxmemory-policy allkeys-lru
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.labels.cache-role == replica
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    networks:
      - ivf-data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    logging: *default-logging

  # Redis Sentinel (High Availability)
  redis-sentinel:
    image: redis:7-alpine
    command: >
      redis-sentinel /etc/redis/sentinel.conf
    configs:
      - source: redis-sentinel-config
        target: /etc/redis/sentinel.conf
    deploy:
      mode: replicated
      replicas: 3
      placement:
        max_replicas_per_node: 1
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    networks:
      - ivf-data
    logging: *default-logging

  # =============================================================================
  # MINIO - Enterprise Configuration
  # =============================================================================
  minio:
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    environment:
      - MINIO_CACHE=on
      - MINIO_CACHE_DRIVES=/cache
      - MINIO_CACHE_QUOTA=80
      - MINIO_CACHE_AFTER=3
      - MINIO_CACHE_WATERMARK_LOW=70
      - MINIO_CACHE_WATERMARK_HIGH=90
      - MINIO_PROMETHEUS_AUTH_TYPE=public
    logging: *default-logging
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]

  # =============================================================================
  # CADDY - Enterprise Configuration
  # =============================================================================
  caddy:
    deploy:
      mode: global
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    logging: *default-logging
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:2019/metrics"]

  # =============================================================================
  # MONITORING - Enterprise Configuration
  # =============================================================================
  prometheus:
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.labels.monitoring == true
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 512M
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=15GB'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    logging: *default-logging

  grafana:
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.labels.monitoring == true
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    logging: *default-logging

  loki:
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.labels.monitoring == true
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    logging: *default-logging

configs:
  redis-sentinel-config:
    external: true

volumes:
  postgres_read1_data:
    driver: local
  postgres_read2_data:
    driver: local

networks:
  ivf-public:
    driver: overlay
    driver_opts:
      encrypted: "true"
  ivf-data:
    driver: overlay
    internal: true
    driver_opts:
      encrypted: "true"
  ivf-signing:
    driver: overlay
    internal: true
    driver_opts:
      encrypted: "true"
  ivf-monitoring:
    driver: overlay
    driver_opts:
      encrypted: "true"
