server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://10.0.4.79:3100/loki/api/v1/push
    batchwait: 1s
    batchsize: 1048576
    tenant_id: ""

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: "container"
      - source_labels: ["__meta_docker_container_log_stream"]
        target_label: "logstream"
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: "compose_service"
      - source_labels: ["__meta_docker_container_label_com_docker_swarm_service_name"]
        target_label: "swarm_service"
      - source_labels: ["__meta_docker_container_label_com_docker_stack_namespace"]
        target_label: "stack"
    pipeline_stages:
      - regex:
          expression: '"@l":"(?P<level>[^"]*)"'
      - regex:
          expression: '"@m":"(?P<message>[^"]*)"'
      - regex:
          expression: '"CorrelationId":"(?P<correlation_id>[^"]*)"'
      - regex:
          expression: '"TenantId":"(?P<tenant_id>[^"]*)"'
      - regex:
          expression: '"UserId":"(?P<user_id>[^"]*)"'
      - regex:
          expression: '"SourceContext":"(?P<source_context>[^"]*)"'
      - labels:
          level:
          source_context:
      - regex:
          expression: '(?P<level_text>(trce|dbug|info|warn|fail|crit|Trace|Debug|Information|Warning|Error|Critical|INFO|WARN|ERROR|FATAL))'
      - labels:
          level_text:
      - drop:
          expression: '(?i)(health|liveness|readiness).*200'
          drop_counter_reason: "healthcheck_noise"
