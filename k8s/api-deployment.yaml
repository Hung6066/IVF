# =====================================================
# IVF API — Deployment + Service
# =====================================================
# Linkerd sidecar injected automatically via namespace annotation.
# All traffic between api ↔ db ↔ redis ↔ minio is mTLS-encrypted.
# =====================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ivf-api
  namespace: ivf
  labels:
    app.kubernetes.io/name: ivf-api
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: ivf-system
  annotations:
    # Linkerd: skip outbound ports for external services
    config.linkerd.io/skip-outbound-ports: "8443,9443"
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ivf-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ivf-api
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: ivf-system
      annotations:
        # Linkerd proxy configuration
        config.linkerd.io/proxy-cpu-request: "10m"
        config.linkerd.io/proxy-memory-request: "20Mi"
        config.linkerd.io/proxy-memory-limit: "250Mi"
        # Enable protocol detection for HTTP/2 (gRPC) + HTTP/1.1
        config.linkerd.io/proxy-log-level: "warn"
    spec:
      serviceAccountName: ivf-api
      securityContext:
        runAsNonRoot: true
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: ghcr.io/hung6066/ivf:latest
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: ivf-api-config
          env:
            - name: ConnectionStrings__DefaultConnection
              valueFrom:
                secretKeyRef:
                  name: ivf-db-credentials
                  key: connection-string
            - name: ConnectionStrings__Redis
              valueFrom:
                secretKeyRef:
                  name: ivf-redis-credentials
                  key: connection-string
            - name: JwtSettings__Secret
              valueFrom:
                secretKeyRef:
                  name: ivf-jwt-secret
                  key: secret
            - name: MinIO__AccessKey
              valueFrom:
                secretKeyRef:
                  name: ivf-minio-credentials
                  key: access-key
            - name: MinIO__SecretKey
              valueFrom:
                secretKeyRef:
                  name: ivf-minio-credentials
                  key: secret-key
          volumeMounts:
            - name: jwt-key
              mountPath: /app/keys/jwt
              readOnly: true
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 45
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 12
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: jwt-key
          secret:
            secretName: ivf-jwt-private-key
            defaultMode: 0400
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: ivf-api
---
apiVersion: v1
kind: Service
metadata:
  name: ivf-api
  namespace: ivf
  labels:
    app.kubernetes.io/name: ivf-api
    app.kubernetes.io/part-of: ivf-system
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: ivf-api
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ivf-api
  namespace: ivf
  labels:
    app.kubernetes.io/name: ivf-api
    app.kubernetes.io/part-of: ivf-system
