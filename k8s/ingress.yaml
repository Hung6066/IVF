# =====================================================
# Ingress — NGINX Ingress with TLS (cert-manager)
# =====================================================
# Replaces Caddy in K8s; Linkerd handles internal mTLS.
# External TLS via cert-manager + Let's Encrypt.
# =====================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ivf-ingress
  namespace: ivf
  labels:
    app.kubernetes.io/part-of: ivf-system
  annotations:
    # cert-manager: auto-issue Let's Encrypt certificates
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # NGINX: proxy settings
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    # WebSocket support for SignalR
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    # Security headers
    nginx.ingress.kubernetes.io/server-snippets: |
      add_header X-Content-Type-Options nosniff always;
      add_header X-Frame-Options DENY always;
      add_header X-XSS-Protection "0" always;
      add_header Referrer-Policy no-referrer always;
      add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
      add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
      add_header Cross-Origin-Embedder-Policy require-corp always;
      add_header Cross-Origin-Opener-Policy same-origin always;
    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "5"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - natra.site
        - "*.natra.site"
      secretName: ivf-tls-cert
  rules:
    - host: natra.site
      http:
        paths:
          # API
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: ivf-api
                port:
                  number: 8080
          # SignalR hubs
          - path: /hubs
            pathType: Prefix
            backend:
              service:
                name: ivf-api
                port:
                  number: 8080
          # Health checks
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: ivf-api
                port:
                  number: 8080
          # Frontend (catch-all)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ivf-frontend
                port:
                  number: 80
    # Tenant subdomain wildcard
    - host: "*.natra.site"
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: ivf-api
                port:
                  number: 8080
          - path: /hubs
            pathType: Prefix
            backend:
              service:
                name: ivf-api
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ivf-frontend
                port:
                  number: 80
