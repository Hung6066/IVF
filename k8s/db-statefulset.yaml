# =====================================================
# PostgreSQL — StatefulSet + Service
# =====================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ivf-db
  namespace: ivf
  labels:
    app.kubernetes.io/name: ivf-db
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: ivf-system
spec:
  serviceName: ivf-db
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ivf-db
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ivf-db
        app.kubernetes.io/component: database
        app.kubernetes.io/part-of: ivf-system
      annotations:
        # Linkerd: enable protocol detection for PostgreSQL (opaque port)
        config.linkerd.io/opaque-ports: "5432"
    spec:
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      containers:
        - name: postgres
          image: postgres:16-alpine
          args:
            - postgres
            - -c
            - wal_level=replica
            - -c
            - max_wal_senders=5
            - -c
            - max_replication_slots=5
            - -c
            - wal_keep_size=256MB
            - -c
            - ssl=on
            - -c
            - ssl_cert_file=/etc/ssl/certs/ssl-cert-snakeoil.pem
            - -c
            - ssl_key_file=/etc/ssl/private/ssl-cert-snakeoil.key
          ports:
            - name: postgresql
              containerPort: 5432
              protocol: TCP
          envFrom:
            - configMapRef:
                name: ivf-db-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ivf-db-credentials
                  key: password
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: archive
              mountPath: /var/lib/postgresql/archive
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
    - metadata:
        name: archive
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: ivf-db
  namespace: ivf
  labels:
    app.kubernetes.io/name: ivf-db
    app.kubernetes.io/part-of: ivf-system
  annotations:
    # Mark PostgreSQL as opaque so Linkerd doesn't try HTTP detection
    config.linkerd.io/opaque-ports: "5432"
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: postgresql
      protocol: TCP
      name: postgresql
  selector:
    app.kubernetes.io/name: ivf-db
