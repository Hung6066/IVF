# =====================================================
# Redis — Deployment + Service
# =====================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ivf-redis
  namespace: ivf
  labels:
    app.kubernetes.io/name: ivf-redis
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: ivf-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ivf-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ivf-redis
        app.kubernetes.io/component: cache
        app.kubernetes.io/part-of: ivf-system
      annotations:
        # Redis uses a non-HTTP protocol — mark as opaque
        config.linkerd.io/opaque-ports: "6379"
    spec:
      containers:
        - name: redis
          image: redis:alpine
          command:
            - redis-server
            - --requirepass
            - $(REDIS_PASSWORD)
            - --maxmemory
            - 256mb
            - --maxmemory-policy
            - allkeys-lru
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ivf-redis-credentials
                  key: password
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            exec:
              command:
                - redis-cli
                - -a
                - $(REDIS_PASSWORD)
                - --no-auth-warning
                - ping
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
          readinessProbe:
            exec:
              command:
                - redis-cli
                - -a
                - $(REDIS_PASSWORD)
                - --no-auth-warning
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: ivf-redis
  namespace: ivf
  labels:
    app.kubernetes.io/name: ivf-redis
    app.kubernetes.io/part-of: ivf-system
  annotations:
    config.linkerd.io/opaque-ports: "6379"
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: redis
      protocol: TCP
      name: redis
  selector:
    app.kubernetes.io/name: ivf-redis
