# ═══════════════════════════════════════════════════════════════════════════════
# PostgreSQL — Enterprise StatefulSet with High Availability
# ═══════════════════════════════════════════════════════════════════════════════
# Features:
#   - Primary/Replica setup with streaming replication
#   - PgBouncer connection pooling
#   - Automatic failover with Patroni (production recommendation)
#   - WAL archiving for PITR (Point-in-Time Recovery)
#   - Resource limits optimized for 10,000+ concurrent users
# ═══════════════════════════════════════════════════════════════════════════════

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ivf-db
  namespace: ivf
  labels:
    app.kubernetes.io/name: ivf-db
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: ivf-system
spec:
  serviceName: ivf-db-headless
  replicas: 1
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: ivf-db
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ivf-db
        app.kubernetes.io/component: database
        app.kubernetes.io/part-of: ivf-system
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9187"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: ivf-db
      terminationGracePeriodSeconds: 120
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault

      initContainers:
        # Set correct permissions on data directory
        - name: init-permissions
          image: busybox:1.36
          command: ['sh', '-c', 'chown -R 999:999 /var/lib/postgresql/data']
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          securityContext:
            runAsUser: 0
            runAsNonRoot: false

      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_USER
              value: "ivf_admin"
            - name: POSTGRES_DB
              value: "ivf_db"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ivf-db-credentials
                  key: password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata

          args:
            # Memory Configuration (optimized for 8GB RAM)
            - "-c"
            - "shared_buffers=2GB"
            - "-c"
            - "work_mem=256MB"
            - "-c"
            - "maintenance_work_mem=512MB"
            - "-c"
            - "effective_cache_size=6GB"
            # WAL Configuration
            - "-c"
            - "wal_buffers=64MB"
            - "-c"
            - "max_wal_size=4GB"
            - "-c"
            - "min_wal_size=1GB"
            - "-c"
            - "checkpoint_completion_target=0.9"
            # Connection Limits
            - "-c"
            - "max_connections=500"
            # Performance
            - "-c"
            - "random_page_cost=1.1"
            - "-c"
            - "effective_io_concurrency=200"
            - "-c"
            - "default_statistics_target=100"
            # Logging
            - "-c"
            - "log_min_duration_statement=500"
            - "-c"
            - "log_checkpoints=on"
            - "-c"
            - "log_connections=on"
            - "-c"
            - "log_disconnections=on"
            - "-c"
            - "log_lock_waits=on"
            # Monitoring
            - "-c"
            - "track_activities=on"
            - "-c"
            - "track_counts=on"
            - "-c"
            - "track_io_timing=on"
            - "-c"
            - "track_functions=all"
            # Replication
            - "-c"
            - "wal_level=replica"
            - "-c"
            - "max_wal_senders=10"
            - "-c"
            - "max_replication_slots=10"
            - "-c"
            - "hot_standby=on"

          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: config
              mountPath: /etc/postgresql/conf.d
              readOnly: true

          resources:
            requests:
              cpu: "2"
              memory: 8Gi
            limits:
              cpu: "4"
              memory: 8Gi

          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U ivf_admin -d ivf_db
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U ivf_admin -d ivf_db
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 999
            capabilities:
              drop: ["ALL"]

        # PostgreSQL Exporter for Prometheus
        - name: postgres-exporter
          image: prometheuscommunity/postgres-exporter:v0.15.0
          ports:
            - name: metrics
              containerPort: 9187
              protocol: TCP
          env:
            - name: DATA_SOURCE_NAME
              valueFrom:
                secretKeyRef:
                  name: ivf-db-credentials
                  key: exporter-dsn
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            capabilities:
              drop: ["ALL"]

      volumes:
        - name: config
          configMap:
            name: ivf-db-config

  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app.kubernetes.io/name: ivf-db
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: fast-ssd
        resources:
          requests:
            storage: 100Gi

---
# ═══════════════════════════════════════════════════════════════════════════════
# PgBouncer Connection Pooler
# ═══════════════════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ivf-pgbouncer
  namespace: ivf
  labels:
    app.kubernetes.io/name: ivf-pgbouncer
    app.kubernetes.io/component: database-proxy
    app.kubernetes.io/part-of: ivf-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: ivf-pgbouncer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ivf-pgbouncer
        app.kubernetes.io/component: database-proxy
    spec:
      containers:
        - name: pgbouncer
          image: edoburu/pgbouncer:1.21.0
          ports:
            - name: pgbouncer
              containerPort: 6432
              protocol: TCP
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ivf-db-credentials
                  key: pgbouncer-url
            - name: POOL_MODE
              value: "transaction"
            - name: MAX_CLIENT_CONN
              value: "2000"
            - name: DEFAULT_POOL_SIZE
              value: "100"
            - name: MIN_POOL_SIZE
              value: "20"
            - name: RESERVE_POOL_SIZE
              value: "50"
            - name: MAX_DB_CONNECTIONS
              value: "200"
            - name: SERVER_LIFETIME
              value: "3600"
            - name: SERVER_IDLE_TIMEOUT
              value: "600"
            - name: QUERY_TIMEOUT
              value: "120"
            - name: LOG_CONNECTIONS
              value: "1"
            - name: LOG_DISCONNECTIONS
              value: "1"

          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi

          livenessProbe:
            tcpSocket:
              port: pgbouncer
            initialDelaySeconds: 10
            periodSeconds: 10

          readinessProbe:
            tcpSocket:
              port: pgbouncer
            initialDelaySeconds: 5
            periodSeconds: 5

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]

---
# ═══════════════════════════════════════════════════════════════════════════════
# Services
# ═══════════════════════════════════════════════════════════════════════════════
apiVersion: v1
kind: Service
metadata:
  name: ivf-db
  namespace: ivf
  labels:
    app.kubernetes.io/name: ivf-db
    app.kubernetes.io/part-of: ivf-system
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: postgres
      protocol: TCP
      name: postgres
  selector:
    app.kubernetes.io/name: ivf-db

---
apiVersion: v1
kind: Service
metadata:
  name: ivf-db-headless
  namespace: ivf
  labels:
    app.kubernetes.io/name: ivf-db
    app.kubernetes.io/part-of: ivf-system
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: 5432
      targetPort: postgres
      name: postgres
  selector:
    app.kubernetes.io/name: ivf-db

---
apiVersion: v1
kind: Service
metadata:
  name: ivf-pgbouncer
  namespace: ivf
  labels:
    app.kubernetes.io/name: ivf-pgbouncer
    app.kubernetes.io/part-of: ivf-system
spec:
  type: ClusterIP
  ports:
    - port: 6432
      targetPort: pgbouncer
      protocol: TCP
      name: pgbouncer
  selector:
    app.kubernetes.io/name: ivf-pgbouncer

---
# ═══════════════════════════════════════════════════════════════════════════════
# PodDisruptionBudget
# ═══════════════════════════════════════════════════════════════════════════════
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ivf-db-pdb
  namespace: ivf
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ivf-db

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ivf-pgbouncer-pdb
  namespace: ivf
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ivf-pgbouncer

---
# ═══════════════════════════════════════════════════════════════════════════════
# ServiceAccount
# ═══════════════════════════════════════════════════════════════════════════════
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ivf-db
  namespace: ivf
automountServiceAccountToken: false

---
# ═══════════════════════════════════════════════════════════════════════════════
# Database ConfigMap
# ═══════════════════════════════════════════════════════════════════════════════
apiVersion: v1
kind: ConfigMap
metadata:
  name: ivf-db-config
  namespace: ivf
data:
  postgresql.conf: |
    # Additional PostgreSQL configuration
    # These settings are in addition to command-line arguments

    # Autovacuum tuning
    autovacuum_max_workers = 4
    autovacuum_naptime = 30s
    autovacuum_vacuum_cost_limit = 2000

    # Statement timeout (prevent runaway queries)
    statement_timeout = 300000

    # Lock timeout
    lock_timeout = 30000

    # Idle session timeout
    idle_session_timeout = 3600000

---
# ═══════════════════════════════════════════════════════════════════════════════
# StorageClass for fast SSD (example for cloud providers)
# ═══════════════════════════════════════════════════════════════════════════════
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: fast-ssd
  labels:
    app.kubernetes.io/part-of: ivf-system
provisioner: kubernetes.io/gce-pd  # Change based on cloud provider
parameters:
  type: pd-ssd
  fsType: ext4
reclaimPolicy: Retain
allowVolumeExpansion: true
volumeBindingMode: WaitForFirstConsumer
